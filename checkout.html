<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - FastPay</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{background:#05070c;color:#fff;min-height:100vh}
    .app{
      max-width:430px;margin:auto;min-height:100vh;padding:18px 18px 120px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .back-btn,.avatar{
      width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,0.06);color:#fff;text-decoration:none;font-size:18px
    }
    .card{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);border-radius:22px;padding:18px;margin-bottom:18px;
      backdrop-filter:blur(10px)
    }
    .title{font-size:30px;font-weight:800;margin-bottom:10px}
    .sub{color:#8b93a7;font-size:14px;line-height:1.5}
    .summary-row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .summary-row:last-child{border-bottom:none}
    .summary-label{color:#8b93a7;font-size:14px}
    .summary-value{font-size:15px;font-weight:700;text-align:right;word-break:break-word;max-width:58%}
    .primary-btn,.secondary-btn{
      display:block;width:100%;border:none;border-radius:18px;font-size:17px;font-weight:700;padding:17px;
      cursor:pointer;text-align:center;margin-top:12px
    }
    .primary-btn{background:#2f3cff;color:#fff;box-shadow:0 14px 30px rgba(47,60,255,0.35)}
    .primary-btn:disabled{opacity:.6;cursor:not-allowed}
    .secondary-btn{background:#11172a;color:#fff;border:1px solid rgba(255,255,255,0.08)}
    .result-box{white-space:pre-wrap;word-break:break-word;font-size:13px;color:#dbe4ff;line-height:1.5}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="services.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="avatar" id="avatar">A</div>
  </div>

  <div class="card">
    <div class="title">Checkout</div>
    <div class="sub">Verifye detay yo epi peye sèvis la.</div>
  </div>

  <div class="card">
    <div class="summary-row">
      <div class="summary-label">Sèvis</div>
      <div class="summary-value" id="service">--</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Pwodwi</div>
      <div class="summary-value" id="product">--</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Montan</div>
      <div class="summary-value" id="amount">0 HTG</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">User ID</div>
      <div class="summary-value" id="userId">1</div>
    </div>

    <button class="primary-btn" id="payBtn" onclick="payNow()">Peye Kounya</button>
    <button class="secondary-btn" onclick="window.location.href='services.html'">Retounen</button>
  </div>

  <div class="card result-box" id="resultBox">Rezilta ap parèt isit...</div>
</div>

<script>
  const API_BASE = "https://fastpayhaiti.onrender.com";
  const savedUser = JSON.parse(localStorage.getItem("fastpay_user") || "{}");
  const checkoutData = JSON.parse(localStorage.getItem("fastpay_checkout") || "{}");
  const payBtn = document.getElementById("payBtn");

  if(savedUser.fullname){
    document.getElementById("avatar").innerText = savedUser.fullname[0].toUpperCase();
  }

  document.getElementById("service").innerText = checkoutData.service || "--";
  document.getElementById("product").innerText = checkoutData.productName || "--";
  document.getElementById("amount").innerText = (checkoutData.amount || 0) + " HTG";
  document.getElementById("userId").innerText = checkoutData.userId || savedUser.id || 1;

  async function payNow(){
    try{
      payBtn.disabled = true;
      payBtn.innerText = "Ap trete...";

      document.getElementById("resultBox").innerText = "Ap kreye order la...";

      const createRes = await fetch(`${API_BASE}/api/checkout/create`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId: checkoutData.userId || savedUser.id || 1,
          service: checkoutData.service,
          productName: checkoutData.productName,
          amount: checkoutData.amount,
          customerData: checkoutData.customerData || {}
        })
      });

      const createData = await createRes.json();

      if(!createRes.ok || !createData.success){
        document.getElementById("resultBox").innerText = JSON.stringify(createData, null, 2);
        payBtn.disabled = false;
        payBtn.innerText = "Peye Kounya";
        return;
      }

      document.getElementById("resultBox").innerText = "Order kreye. Ap fè peman an...";

      const payRes = await fetch(`${API_BASE}/api/checkout/pay-and-deliver`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          orderId: createData.order.id
        })
      });

      const payData = await payRes.json();
      document.getElementById("resultBox").innerText = JSON.stringify(payData, null, 2);

      if(payRes.ok && payData.success){
        localStorage.setItem("fastpay_last_order", JSON.stringify(payData));
        setTimeout(() => {
          window.location.href = "success.html";
        }, 1500);
      } else {
        payBtn.disabled = false;
        payBtn.innerText = "Peye Kounya";
      }
    }catch(error){
      document.getElementById("resultBox").innerText = "Erè pandan checkout la:\n\n" + error.message;
      payBtn.disabled = false;
      payBtn.innerText = "Peye Kounya";
    }
  }
</script>
</body>
</html>
