<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - FastPay</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-content">
    <div class="header-card">
      <h1>Checkout</h1>
      <div class="sub">Peye sèvis ou ak wallet FastPay.</div>
    </div>

    <div class="panel">
      <label>User ID</label>
      <input id="userId" value="1" />

      <label>Service</label>
      <select id="service">
        <option value="topup">Topup</option>
        <option value="giftcard">Giftcard</option>
        <option value="netflix">Netflix</option>
        <option value="primevideo">Prime Video</option>
        <option value="freefire">FreeFire</option>
      </select>

      <label>Product Name</label>
      <input id="productName" placeholder="Eg: Netflix Standard" />

      <label>Amount</label>
      <input id="amount" type="number" placeholder="Eg: 10" />

      <label>Customer Data</label>
      <input id="customerData" placeholder='Eg: {"email":"client@gmail.com"}' />

      <button onclick="createOrder()">Create Order</button>
    </div>

    <div class="panel">
      <label>Order ID</label>
      <input id="orderId" placeholder="Order ID ap parèt la" />
      <button onclick="payOrder()">Pay with Wallet</button>
      <button onclick="deliverOrder()" style="margin-top:10px;">Auto Deliver</button>
    </div>

    <div class="panel">
      <div id="result" class="result">Rezilta ap parèt isit...</div>
    </div>
  </div>

  <div id="nav-root"></div>

  <script src="js/app.js"></script>
  <script>
    loadPageNav("services");

    const API = "https://fastpayhaiti.onrender.com";

    async function createOrder() {
      const userId = document.getElementById("userId").value;
      const service = document.getElementById("service").value;
      const productName = document.getElementById("productName").value;
      const amount = document.getElementById("amount").value;
      const customerDataRaw = document.getElementById("customerData").value;

      let customerData = {};
      if (customerDataRaw.trim()) {
        try {
          customerData = JSON.parse(customerDataRaw);
        } catch {
          document.getElementById("result").innerText = "Customer Data a pa bon JSON.";
          return;
        }
      }

      const res = await fetch(`${API}/api/checkout/create`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId,
          service,
          productName,
          amount,
          customerData
        })
      });

      const data = await res.json();
      document.getElementById("result").innerText = JSON.stringify(data, null, 2);

      if (data.order && data.order.id) {
        document.getElementById("orderId").value = data.order.id;
      }
    }

    async function payOrder() {
      const orderId = document.getElementById("orderId").value;

      const res = await fetch(`${API}/api/checkout/pay`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ orderId })
      });

      const data = await res.json();
      document.getElementById("result").innerText = JSON.stringify(data, null, 2);
    }

    async function deliverOrder() {
      const orderId = document.getElementById("orderId").value;

      const res = await fetch(`${API}/api/orders/deliver`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ orderId })
      });

      const data = await res.json();
      document.getElementById("result").innerText = JSON.stringify(data, null, 2);
    }
  </script>
</body>
                            </html>
