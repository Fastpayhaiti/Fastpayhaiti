<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPay Premium Deposit</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      background:#05070c;
      color:#ffffff;
      min-height:100vh;
    }

    .app{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      padding:18px 18px 110px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .left-top{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      color:#ffffff;
      font-size:22px;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .page-title{
      font-size:24px;
      font-weight:800;
    }

    .profile-avatar{
      width:48px;
      height:48px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:700;
    }

    .hero-card{
      background:linear-gradient(135deg,#0d1117,#1c2330);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:22px;
      margin-bottom:22px;
      box-shadow:0 22px 45px rgba(0,0,0,0.35);
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(59,130,246,0.10);
      top:-40px;
      right:-40px;
    }

    .hero-label{
      color:#9ca3af;
      font-size:14px;
      margin-bottom:8px;
      position:relative;
      z-index:2;
    }

    .hero-balance{
      font-size:36px;
      font-weight:800;
      position:relative;
      z-index:2;
    }

    .hero-sub{
      margin-top:10px;
      color:#8b93a7;
      font-size:14px;
      position:relative;
      z-index:2;
    }

    .section{
      margin-bottom:24px;
    }

    .section-title{
      font-size:22px;
      font-weight:800;
      margin-bottom:14px;
    }

    .glass-box{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:16px;
    }

    label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin-bottom:8px;
      color:#d7deee;
    }

    input, select, textarea{
      width:100%;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      color:#ffffff;
      padding:14px;
      font-size:15px;
      margin-bottom:14px;
      outline:none;
    }

    input::placeholder,
    textarea::placeholder{
      color:#7f879b;
    }

    select option{
      background:#0f131b;
      color:#ffffff;
    }

    .summary-box{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:16px;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,0.06);
      font-size:14px;
    }

    .summary-row:last-child{
      border-bottom:none;
    }

    .summary-label{
      color:#8b93a7;
    }

    .summary-value{
      font-weight:800;
      text-align:right;
    }

    .toolbar{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:16px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      text-align:center;
      padding:16px;
      border-radius:18px;
      color:#ffffff;
      font-weight:700;
      font-size:15px;
      border:none;
      cursor:pointer;
    }

    .btn-blue{
      background:#2f3cff;
      box-shadow:0 14px 30px rgba(47,60,255,0.35);
    }

    .btn-dark{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      width:100%;
      max-width:430px;
      background:#04060a;
      border-top:1px solid rgba(255,255,255,0.08);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      padding:12px 8px 14px;
      z-index:1000;
    }

    .nav-item{
      text-decoration:none;
      color:#8b93a7;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:600;
    }

    .nav-item i{
      font-size:23px;
    }

    .nav-item.active{
      color:#3b4cff;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="left-top">
      <a href="wallet.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="page-title">Deposit</div>
    </div>
    <div class="profile-avatar" id="profileLetter">A</div>
  </div>

  <div class="hero-card">
    <div class="hero-label">Wallet Balance</div>
    <div class="hero-balance" id="walletBalance">0 HTG</div>
    <div class="hero-sub">Ajoute lajan sou wallet ou fasil.</div>
  </div>

  <div class="section">
    <div class="section-title">Deposit Details</div>
    <div class="glass-box">
      <label>Amount (HTG)</label>
      <input type="number" id="amount" placeholder="Antre montan an" oninput="updateSummary()">

      <label>Method</label>
      <select id="method" onchange="updateSummary()">
        <option>MonCash</option>
        <option>NatCash</option>
        <option>Bank Transfer</option>
        <option>Cash</option>
        <option>Wallet Agent</option>
      </select>

      <label>Reference / Note</label>
      <textarea id="note" placeholder="Mete referans oswa detay peman an" oninput="updateSummary()"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Summary</div>
    <div class="summary-box">
      <div class="summary-row">
        <div class="summary-label">Amount</div>
        <div class="summary-value" id="summaryAmount">0 HTG</div>
      </div>
      <div class="summary-row">
        <div class="summary-label">Method</div>
        <div class="summary-value" id="summaryMethod">MonCash</div>
      </div>
      <div class="summary-row">
        <div class="summary-label">Status</div>
        <div class="summary-value">Pending</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-blue" onclick="submitDeposit()">Submit Deposit</button>
      <a href="deposit-history.html" class="btn btn-dark">Deposit History</a>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>
  <a href="statement.html" class="nav-item">
    <i class="fa-solid fa-arrow-rotate-left"></i>
    <span>Transactions</span>
  </a>
  <a href="giftcard.html" class="nav-item">
    <i class="fa-brands fa-bitcoin"></i>
    <span>Services</span>
  </a>
  <a href="card-dashboard.html" class="nav-item">
    <i class="fa-regular fa-credit-card"></i>
    <span>Cards</span>
  </a>
  <a href="wallet.html" class="nav-item active">
    <i class="fa-solid fa-wallet"></i>
    <span>Wallet</span>
  </a>
</div>

<script src="app.js"></script>
<script>
  const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
  if(savedUser && savedUser.fullname){
    document.getElementById("profileLetter").innerText = savedUser.fullname.charAt(0).toUpperCase();
    document.getElementById("walletBalance").innerText = (savedUser.balance || 0) + " HTG";
  }

  function getCurrentUser(){
    if(window.FastPayV2 && FastPayV2.getCurrentUser){
      return FastPayV2.getCurrentUser();
    }
    return savedUser;
  }

  function updateSummary(){
    const amount = document.getElementById("amount").value || 0;
    const method = document.getElementById("method").value;
    document.getElementById("summaryAmount").innerText = amount + " HTG";
    document.getElementById("summaryMethod").innerText = method;
  }

  function submitDeposit(){
    const user = getCurrentUser();
    if(!user){
      alert("Ou pa konekte.");
      return;
    }

    const amount = parseInt(document.getElementById("amount").value || "0");
    const method = document.getElementById("method").value;
    const note = document.getElementById("note").value.trim();

    if(!amount || amount <= 0){
      alert("Tanpri mete yon montan ki valab.");
      return;
    }

    const deposits = JSON.parse(localStorage.getItem("fastpay_deposits") || "[]");
    const newDeposit = {
      id: "DEP_" + Date.now(),
      userId: user.id,
      amount: amount + " HTG",
      amountValue: amount,
      method: method,
      note: note,
      status: "Pending",
      date: new Date().toLocaleString()
    };

    deposits.unshift(newDeposit);
    localStorage.setItem("fastpay_deposits", JSON.stringify(deposits));

    if(window.FastPayV2 && FastPayV2.addTransaction){
      FastPayV2.addTransaction({
        userId: user.id,
        service: "Deposit Request",
        amount: "+" + amount + " HTG",
        type: "deposit",
        status: "pending",
        meta: { method, note }
      });
    }

    if(window.FastPayV2 && FastPayV2.addNotification){
      FastPayV2.addNotification({
        userId: user.id,
        title: "Deposit submitted",
        text: "Nou resevwa demann depo ou a.",
        type: "info"
      });
    }

    alert("Demann depo a anrejistre avèk siksè.");
    window.location.href = "deposit-history.html";
  }

  updateSummary();
</script>

</body>
  </html>
