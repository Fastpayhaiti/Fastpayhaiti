<script>
const API = "https://fastpayhaiti.onrender.com";

async function loadOperators(){
  const country = document.getElementById("country").value;

  const res = await fetch(`${API}/api/reloadly/operators/${country}`);
  const data = await res.json();

  const select = document.getElementById("operator");
  select.innerHTML = "";

  data.forEach(op => {
    let opt = document.createElement("option");
    opt.value = op.id;
    opt.textContent = op.name;
    select.appendChild(opt);
  });
}

async function sendTopup(){
  const body = {
    operatorId: document.getElementById("operator").value,
    amount: document.getElementById("amount").value,
    phone: document.getElementById("phone").value,
    country: document.getElementById("country").value
  };

  const res = await fetch(`${API}/api/reloadly/topup`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });

  const data = await res.json();

  alert("Topup fini ✔️");
  console.log(data);
}
</script>

<select id="country" onchange="loadOperators()">
  <option value="HT">Haiti</option>
  <option value="US">USA</option>
</select>

<select id="operator"></select>

<input id="phone" placeholder="Phone">
<input id="amount" placeholder="Amount">

<button onclick="sendTopup()">Topup</button>
