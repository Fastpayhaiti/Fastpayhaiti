<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Topup - FastPay</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{background:#05070c;color:#fff;min-height:100vh}
    .app{
      max-width:430px;margin:auto;min-height:100vh;padding:18px 18px 120px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .back-btn,.avatar{
      width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,0.06);color:#fff;text-decoration:none;font-size:18px
    }
    .card{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);border-radius:22px;padding:18px;margin-bottom:18px;
      backdrop-filter:blur(10px)
    }
    .title{font-size:30px;font-weight:800;margin-bottom:10px}
    .sub{color:#8b93a7;font-size:14px;line-height:1.5}
    .field{margin-top:16px}
    .field label{display:block;font-size:14px;color:#c7cfdd;margin-bottom:8px;font-weight:600}
    .input,.select{
      width:100%;padding:14px;border-radius:16px;background:#11172a;border:1px solid rgba(255,255,255,0.08);
      color:#fff;outline:none
    }
    .input::placeholder{color:#7f8798}
    .amount-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
    .amount-chip{
      border:none;border-radius:16px;padding:14px 10px;background:#11172a;color:#fff;font-size:15px;font-weight:700;
      cursor:pointer;border:1px solid rgba(255,255,255,0.08)
    }
    .amount-chip.active{background:#2f3cff;border-color:transparent;box-shadow:0 12px 24px rgba(47,60,255,0.28)}
    .summary-row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .summary-row:last-child{border-bottom:none}
    .summary-label{color:#8b93a7;font-size:14px}
    .summary-value{font-size:15px;font-weight:700;text-align:right;word-break:break-word;max-width:58%}
    .primary-btn,.secondary-btn{
      display:block;width:100%;border:none;border-radius:18px;font-size:17px;font-weight:700;padding:17px;
      cursor:pointer;text-align:center;margin-top:12px
    }
    .primary-btn{background:#2f3cff;color:#fff;box-shadow:0 14px 30px rgba(47,60,255,0.35)}
    .secondary-btn{background:#11172a;color:#fff;border:1px solid rgba(255,255,255,0.08)}
    .hint{color:#8b93a7;font-size:13px;line-height:1.5;margin-top:8px}
    .bottom-nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;background:#04060a;
      border-top:1px solid rgba(255,255,255,0.08);display:grid;grid-template-columns:repeat(5,1fr);
      padding:12px 8px 14px;z-index:1000
    }
    .nav-item{text-decoration:none;color:#8b93a7;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:12px;font-weight:600}
    .nav-item i{font-size:23px}
    .nav-item.active{color:#3b4cff}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="services.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="avatar" id="avatar">A</div>
  </div>

  <div class="card">
    <div class="title">Topup</div>
    <div class="sub">Rechaje liy mobil fasil ak FastPay.</div>
  </div>

  <div class="card">
    <div class="field">
      <label>User ID</label>
      <input id="userId" class="input" type="number" value="1">
    </div>

    <div class="field">
      <label>Operatè</label>
      <select id="operator" class="select" onchange="updateSummary()">
        <option value="">Chwazi operatè a</option>
        <option value="173">Digicel Haiti</option>
      </select>
      <div class="hint">Pou test sandbox la, n ap itilize Digicel Haiti.</div>
    </div>

    <div class="field">
      <label>Nimewo telefòn</label>
      <input id="phone" class="input" type="text" placeholder="Eg: 50912345678" oninput="updateSummary()">
    </div>

    <div class="field">
      <label>Montan</label>
      <input id="amount" class="input" type="number" placeholder="Eg: 10" oninput="updateSummary()">
      <div class="amount-grid">
        <button type="button" class="amount-chip" onclick="setAmount(10, this)">10</button>
        <button type="button" class="amount-chip" onclick="setAmount(20, this)">20</button>
        <button type="button" class="amount-chip" onclick="setAmount(25, this)">25</button>
        <button type="button" class="amount-chip" onclick="setAmount(50, this)">50</button>
        <button type="button" class="amount-chip" onclick="setAmount(100, this)">100</button>
        <button type="button" class="amount-chip" onclick="setAmount(150, this)">150</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="summary-row">
      <div class="summary-label">Sèvis</div>
      <div class="summary-value">Topup</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Operatè</div>
      <div class="summary-value" id="summaryOperator">--</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Nimewo</div>
      <div class="summary-value" id="summaryPhone">--</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Montan</div>
      <div class="summary-value" id="summaryAmount">0 HTG</div>
    </div>

    <button class="primary-btn" onclick="goCheckout()">Kontinye sou Checkout</button>
    <button class="secondary-btn" onclick="window.location.href='services.html'">Retounen</button>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
  <a href="statement.html" class="nav-item"><i class="fa-solid fa-arrow-rotate-left"></i><span>Transactions</span></a>
  <a href="services.html" class="nav-item active"><i class="fa-brands fa-bitcoin"></i><span>Services</span></a>
  <a href="card-dashboard.html" class="nav-item"><i class="fa-regular fa-credit-card"></i><span>Cards</span></a>
  <a href="wallet.html" class="nav-item"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
</div>

<script>
  const savedUser = JSON.parse(localStorage.getItem("fastpay_user") || "{}");

  if(savedUser.fullname){
    document.getElementById("avatar").innerText = savedUser.fullname[0].toUpperCase();
    if(savedUser.id){
      document.getElementById("userId").value = savedUser.id;
    }
  }

  function setAmount(value, btn){
    document.getElementById("amount").value = value;
    document.querySelectorAll(".amount-chip").forEach(chip => chip.classList.remove("active"));
    btn.classList.add("active");
    updateSummary();
  }

  function updateSummary(){
    const operatorSelect = document.getElementById("operator");
    const operatorText = operatorSelect.options[operatorSelect.selectedIndex]?.text || "--";
    document.getElementById("summaryOperator").innerText =
      operatorSelect.value ? operatorText : "--";

    document.getElementById("summaryPhone").innerText =
      document.getElementById("phone").value || "--";

    document.getElementById("summaryAmount").innerText =
      (document.getElementById("amount").value || 0) + " HTG";
  }

  function goCheckout(){
    const userId = Number(document.getElementById("userId").value);
    const operatorId = Number(document.getElementById("operator").value);
    const phone = document.getElementById("phone").value.trim();
    const amount = Number(document.getElementById("amount").value);

    if(!userId || !operatorId || !phone || !amount){
      alert("Tanpri ranpli tout chan yo.");
      return;
    }

    localStorage.setItem("fastpay_checkout", JSON.stringify({
      userId,
      service: "topup",
      productName: "Digicel Haiti",
      amount,
      customerData: {
        operatorId,
        countryCode: "HT",
        phone
      }
    }));

    window.location.href = "checkout.html";
  }

  updateSummary();
</script>
</body>
        </html>
