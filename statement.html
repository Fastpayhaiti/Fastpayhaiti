<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPay Statement</title>
<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  background:#eef2f7;
  padding:20px;
  color:#111827;
}

.container{
  max-width:430px;
  margin:auto;
}

.back{
  display:inline-block;
  margin-bottom:16px;
  color:#ff4d3d;
  text-decoration:none;
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.logo{
  font-size:30px;
  font-weight:bold;
  color:#ff5a3d;
}

.profile{
  width:46px;
  height:46px;
  border-radius:14px;
  background:linear-gradient(135deg,#ff5a3d,#ff7a59);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 6px 16px rgba(255,90,61,0.25);
}

.hero{
  background:linear-gradient(135deg,#111827,#374151);
  color:white;
  border-radius:26px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(17,24,39,0.22);
}

.hero h1{
  margin:0 0 10px 0;
  font-size:30px;
  line-height:1.2;
}

.hero p{
  margin:0;
  font-size:15px;
  line-height:1.6;
  opacity:0.98;
}

.section{
  background:white;
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 18px rgba(0,0,0,0.06);
  margin-bottom:18px;
}

.section h2{
  margin:0 0 14px 0;
  font-size:22px;
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.stat-box{
  background:#f8fafc;
  border-radius:16px;
  padding:14px;
}

.stat-title{
  color:#6b7280;
  font-size:13px;
  margin-bottom:6px;
}

.stat-value{
  font-size:20px;
  font-weight:bold;
  color:#111827;
}

.statement-item{
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.statement-item:last-child{
  border-bottom:none;
}

.statement-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.statement-name{
  font-weight:bold;
  font-size:15px;
}

.statement-amount{
  font-weight:bold;
  font-size:15px;
  text-align:right;
}

.statement-date{
  color:#6b7280;
  font-size:13px;
  margin-top:4px;
}

.statement-sub{
  color:#6b7280;
  font-size:13px;
  margin-top:4px;
  line-height:1.45;
}

.badge{
  display:inline-block;
  margin-top:6px;
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;
  font-weight:bold;
}

.badge-green{
  background:#ecfdf3;
  color:#166534;
}

.badge-orange{
  background:#fff7ed;
  color:#c2410c;
}

.badge-blue{
  background:#eff6ff;
  color:#1d4ed8;
}

.empty{
  color:#6b7280;
  font-size:14px;
}

.main-btn{
  display:block;
  width:100%;
  text-align:center;
  padding:15px;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
  margin-top:12px;
}

.orange-btn{
  background:#ff4d3d;
  color:white;
}

.dark-btn{
  background:#111827;
  color:white;
}
</style>
</head>
<body>

<div class="container">

<a href="wallet.html" class="back">← Back Wallet</a>

<div class="topbar">
  <div class="logo">FastPay</div>
  <div class="profile" id="profileLetter">L</div>
</div>

<div class="hero">
  <h1>Wallet Statement</h1>
  <p>Tout mouvman finans ou yo nan yon sèl paj: depo, retrè, transfè, ak acha sèvis.</p>
</div>

<div class="section">
  <h2>Rezime</h2>

  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-title">Wallet Balance</div>
      <div class="stat-value" id="walletBalance">0 HTG</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Total Mouvman</div>
      <div class="stat-value" id="totalEntries">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Dènye Aktivite</div>
      <div class="stat-value" id="lastEntry">Pa gen</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Dènye Dat</div>
      <div class="stat-value" id="lastDate">N/A</div>
    </div>
  </div>
</div>

<div class="section">
  <h2>Tout mouvman yo</h2>
  <div id="statementBox" class="empty">Pa gen mouvman pou kounye a.</div>

  <a href="dashboard.html" class="main-btn orange-btn">Ale sou Dashboard</a>
  <a href="wallet.html" class="main-btn dark-btn">Retounen sou Wallet</a>
</div>

</div>

<script>
const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
const deposits = JSON.parse(localStorage.getItem("fastpay_deposits")) || [];
const withdraws = JSON.parse(localStorage.getItem("fastpay_withdraws")) || [];
const transfers = JSON.parse(localStorage.getItem("fastpay_transfers")) || [];
const transactions = JSON.parse(localStorage.getItem("fastpay_transactions")) || [];
const topups = JSON.parse(localStorage.getItem("fastpay_topups")) || [];
const socialOrders = JSON.parse(localStorage.getItem("fastpay_social_orders")) || [];
const rechargeCards = JSON.parse(localStorage.getItem("fastpay_recharge_cards")) || [];
const cardRequests = JSON.parse(localStorage.getItem("fastpay_card_requests")) || [];
const walletBalance = localStorage.getItem("fastpay_balance") || 0;

if(savedUser && savedUser.fullname){
  document.getElementById("profileLetter").innerHTML =
    savedUser.fullname.charAt(0).toUpperCase();
}

document.getElementById("walletBalance").innerHTML = walletBalance + " HTG";

function normalizeEntries(){
  let all = [];

  deposits.forEach(item => {
    all.push({
      title: item.bank || "Deposit",
      amount: item.amount || "0",
      date: item.date || "",
      type: "Deposit",
      sub: "Method: " + (item.method || "N/A"),
      status: item.status || "Pending Verification",
      badge: "green"
    });
  });

  withdraws.forEach(item => {
    all.push({
      title: item.bank || item.method || "Withdraw",
      amount: item.amount || "0",
      date: item.date || "",
      type: "Withdraw",
      sub: "Method: " + (item.method || "N/A"),
      status: item.status || "Pending Verification",
      badge: "orange"
    });
  });

  transfers.forEach(item => {
    all.push({
      title: item.receiverName || "Transfer",
      amount: item.amount || "0",
      date: item.date || "",
      type: "Transfer",
      sub: "To: " + (item.receiverId || "N/A"),
      status: item.status || "Pending Verification",
      badge: "blue"
    });
  });

  transactions.forEach(item => {
    all.push({
      title: item.service || "Transaction",
      amount: item.amount || "0",
      date: item.date || "",
      type: "Wallet Transaction",
      sub: "Order ID: " + (item.orderId || "N/A"),
      status: "Completed",
      badge: "green"
    });
  });

  topups.forEach(item => {
    all.push({
      title: item.operator || "Top Up",
      amount: item.amount || "0",
      date: item.date || "",
      type: "Top Up",
      sub: "Phone: " + (item.phoneNumber || "N/A"),
      status: item.status || "Pending Payment Verification",
      badge: "orange"
    });
  });

  socialOrders.forEach(item => {
    all.push({
      title: item.service || "Social Media Order",
      amount: item.amount || "0",
      date: item.date || "",
      type: "Social Media",
      sub: "Platform: " + (item.platform || "N/A"),
      status: item.status || "Pending Review",
      badge: "blue"
    });
  });

  rechargeCards.forEach(item => {
    all.push({
      title: item.service || "Recharge Card",
      amount: item.amount || "0",
      date: item.date || "",
      type: "Recharge Card",
      sub: "Account: " + (item.accountName || "N/A"),
      status: item.status || "Pending Verification",
      badge: "orange"
    });
  });

  cardRequests.forEach(item => {
    all.push({
      title: item.cardType || "Virtual Card",
      amount: item.amount || "1500 HTG",
      date: item.date || "",
      type: "Card Request",
      sub: "Payment: " + (item.paymentMethod || "N/A"),
      status: item.status || "Pending Payment Verification",
      badge: "blue"
    });
  });

  return all.sort((a, b) => new Date(b.date) - new Date(a.date));
}

const allEntries = normalizeEntries();

document.getElementById("totalEntries").innerHTML = allEntries.length;

if(allEntries.length > 0){
  document.getElementById("lastEntry").innerHTML = allEntries[0].title || "Wi";
  document.getElementById("lastDate").innerHTML = allEntries[0].date || "N/A";
}

function getBadgeClass(type){
  if(type === "green") return "badge-green";
  if(type === "blue") return "badge-blue";
  return "badge-orange";
}

function loadStatement(){
  const box = document.getElementById("statementBox");

  if(allEntries.length === 0){
    box.innerHTML = "Pa gen mouvman pou kounye a.";
    return;
  }

  box.innerHTML = "";

  allEntries.forEach(item => {
    box.innerHTML += `
      <div class="statement-item">
        <div class="statement-top">
          <div>
            <div class="statement-name">${item.title}</div>
            <div class="statement-date">${item.date}</div>
          </div>
          <div class="statement-amount">${item.amount}</div>
        </div>

        <div class="statement-sub"><strong>Type:</strong> ${item.type}</div>
        <div class="statement-sub">${item.sub}</div>
        <div class="badge ${getBadgeClass(item.badge)}">${item.status}</div>
      </div>
    `;
  });
}

loadStatement();
</script>

</body>
</html>
