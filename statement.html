<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPay Premium Statement</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      background:#05070c;
      color:#ffffff;
      min-height:100vh;
    }

    .app{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      padding:18px 18px 110px;
      position:relative;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .left-top{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      color:#ffffff;
      font-size:22px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      backdrop-filter:blur(10px);
    }

    .page-title{
      font-size:24px;
      font-weight:800;
    }

    .profile-avatar{
      width:48px;
      height:48px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      color:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:700;
    }

    .hero-card{
      background:linear-gradient(135deg,#0d1117,#1c2330);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:22px;
      margin-bottom:22px;
      box-shadow:0 22px 45px rgba(0,0,0,0.35);
      overflow:hidden;
      position:relative;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(59,130,246,0.10);
      top:-40px;
      right:-40px;
    }

    .hero-top{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }

    .hero-label{
      color:#9ca3af;
      font-size:14px;
      margin-bottom:6px;
    }

    .hero-balance{
      font-size:36px;
      font-weight:800;
      line-height:1.1;
    }

    .hero-sub{
      margin-top:10px;
      color:#8b93a7;
      font-size:14px;
      word-break:break-word;
      position:relative;
      z-index:2;
    }

    .hero-badge{
      padding:8px 14px;
      border-radius:999px;
      background:rgba(47,60,255,0.18);
      color:#b9c2ff;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .stats-grid{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      position:relative;
      z-index:2;
    }

    .mini-box{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:18px;
      padding:14px;
    }

    .mini-label{
      color:#8b93a7;
      font-size:12px;
      margin-bottom:6px;
    }

    .mini-value{
      font-size:20px;
      font-weight:800;
    }

    .section{
      margin-bottom:24px;
    }

    .section-title{
      font-size:22px;
      font-weight:800;
      margin-bottom:14px;
    }

    .filter-row{
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding-bottom:4px;
      margin-bottom:14px;
    }

    .filter-row::-webkit-scrollbar{
      display:none;
    }

    .filter-btn{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      background:rgba(255,255,255,0.06);
      color:#cdd4e3;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      cursor:pointer;
      border:1px solid rgba(255,255,255,0.08);
    }

    .filter-btn.active{
      background:#2f3cff;
      color:#ffffff;
      border-color:transparent;
    }

    .list-box{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:10px 16px;
    }

    .list-item{
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .list-item:last-child{
      border-bottom:none;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .item-title{
      font-size:15px;
      font-weight:700;
      margin-bottom:5px;
    }

    .item-sub{
      color:#8b93a7;
      font-size:13px;
      line-height:1.45;
    }

    .item-amount{
      font-size:15px;
      font-weight:800;
      white-space:nowrap;
      text-align:right;
    }

    .item-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      margin-top:8px;
    }

    .badge-success{
      background:rgba(17,156,103,0.18);
      color:#7ff0be;
    }

    .badge-warning{
      background:rgba(245,158,11,0.18);
      color:#fcd34d;
    }

    .badge-danger{
      background:rgba(217,60,75,0.18);
      color:#ffb4bf;
    }

    .empty{
      color:#8b93a7;
      font-size:14px;
      padding:10px 0;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      width:100%;
      max-width:430px;
      background:#04060a;
      border-top:1px solid rgba(255,255,255,0.08);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      padding:12px 8px 14px;
      z-index:1000;
    }

    .nav-item{
      text-decoration:none;
      color:#8b93a7;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:600;
    }

    .nav-item i{
      font-size:23px;
    }

    .nav-item.active{
      color:#3b4cff;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="left-top">
      <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="page-title">Statement</div>
    </div>
    <div class="profile-avatar" id="profileLetter">A</div>
  </div>

  <div class="hero-card">
    <div class="hero-top">
      <div>
        <div class="hero-label">Wallet Balance</div>
        <div class="hero-balance" id="walletBalance">0 HTG</div>
      </div>
      <div class="hero-badge">Transactions</div>
    </div>

    <div class="hero-sub" id="walletSub">FastPay Wallet</div>

    <div class="stats-grid">
      <div class="mini-box">
        <div class="mini-label">Total Transactions</div>
        <div class="mini-value" id="totalTransactions">0</div>
      </div>

      <div class="mini-box">
        <div class="mini-label">Deposits</div>
        <div class="mini-value" id="totalDeposits">0</div>
      </div>

      <div class="mini-box">
        <div class="mini-label">Withdrawals</div>
        <div class="mini-value" id="totalWithdrawals">0</div>
      </div>

      <div class="mini-box">
        <div class="mini-label">Transfers</div>
        <div class="mini-value" id="totalTransfers">0</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Filters</div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('deposit', this)">Deposits</button>
      <button class="filter-btn" onclick="setFilter('withdraw', this)">Withdrawals</button>
      <button class="filter-btn" onclick="setFilter('transfer', this)">Transfers</button>
      <button class="filter-btn" onclick="setFilter('card', this)">Cards</button>
    </div>

    <div class="list-box" id="statementBox">
      <div class="empty">Pa gen tranzaksyon pou kounye a.</div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="statement.html" class="nav-item active">
    <i class="fa-solid fa-arrow-rotate-left"></i>
    <span>Transactions</span>
  </a>

  <a href="giftcard.html" class="nav-item">
    <i class="fa-brands fa-bitcoin"></i>
    <span>Services</span>
  </a>

  <a href="card-dashboard.html" class="nav-item">
    <i class="fa-regular fa-credit-card"></i>
    <span>Cards</span>
  </a>

  <a href="wallet.html" class="nav-item">
    <i class="fa-solid fa-wallet"></i>
    <span>Wallet</span>
  </a>
</div>

<script src="app.js"></script>
<script>
  let currentFilter = "all";

  const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
  const profileLetter = document.getElementById("profileLetter");
  const walletBalance = document.getElementById("walletBalance");
  const walletSub = document.getElementById("walletSub");

  function getCurrentUser(){
    if(window.FastPayV2 && FastPayV2.getCurrentUser){
      return FastPayV2.getCurrentUser();
    }
    return savedUser;
  }

  function getTransactions(userId){
    if(window.FastPayV2 && FastPayV2.getUserTransactions){
      return FastPayV2.getUserTransactions(userId) || [];
    }
    return [];
  }

  function setFilter(type, el){
    currentFilter = type;
    document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
    el.classList.add("active");
    renderStatement();
  }

  function getBadgeClass(status){
    const s = String(status || "").toLowerCase();
    if(s.includes("completed") || s.includes("approved") || s.includes("paid")) return "badge-success";
    if(s.includes("rejected") || s.includes("failed")) return "badge-danger";
    return "badge-warning";
  }

  function getFilteredTransactions(transactions){
    if(currentFilter === "all") return transactions;

    if(currentFilter === "deposit"){
      return transactions.filter(tx =>
        String(tx.type || "").toLowerCase().includes("deposit")
      );
    }

    if(currentFilter === "withdraw"){
      return transactions.filter(tx =>
        String(tx.type || "").toLowerCase().includes("withdraw")
      );
    }

    if(currentFilter === "transfer"){
      return transactions.filter(tx =>
        String(tx.type || "").toLowerCase().includes("transfer")
      );
    }

    if(currentFilter === "card"){
      return transactions.filter(tx =>
        String(tx.type || "").toLowerCase().includes("card")
      );
    }

    return transactions;
  }

  function renderStats(transactions){
    document.getElementById("totalTransactions").innerText = transactions.length;
    document.getElementById("totalDeposits").innerText =
      transactions.filter(tx => String(tx.type || "").toLowerCase().includes("deposit")).length;
    document.getElementById("totalWithdrawals").innerText =
      transactions.filter(tx => String(tx.type || "").toLowerCase().includes("withdraw")).length;
    document.getElementById("totalTransfers").innerText =
      transactions.filter(tx => String(tx.type || "").toLowerCase().includes("transfer")).length;
  }

  function renderStatement(){
    const currentUser = getCurrentUser();
    if(!currentUser || !currentUser.id) return;

    const allTransactions = getTransactions(currentUser.id);
    renderStats(allTransactions);

    const transactions = getFilteredTransactions(allTransactions);
    const box = document.getElementById("statementBox");

    if(transactions.length === 0){
      box.innerHTML = `<div class="empty">Pa gen tranzaksyon pou filtè sa a.</div>`;
      return;
    }

    box.innerHTML = "";
    transactions.forEach(function(tx){
      box.innerHTML += `
        <div class="list-item">
          <div class="item-top">
            <div>
              <div class="item-title">${tx.service || "Transaction"}</div>
              <div class="item-sub">${tx.date || ""}</div>
              <div class="item-sub">${tx.type || "general"}</div>
              <div class="item-badge ${getBadgeClass(tx.status)}">${tx.status || "completed"}</div>
            </div>
            <div class="item-amount">${tx.amount || "0"}</div>
          </div>
        </div>
      `;
    });
  }

  if(savedUser && savedUser.fullname){
    profileLetter.innerText = savedUser.fullname.charAt(0).toUpperCase();
    walletBalance.innerText = (savedUser.balance || 0) + " HTG";
    walletSub.innerText = savedUser.email || "FastPay Wallet";
  }

  renderStatement();
</script>

</body>
  </html>
