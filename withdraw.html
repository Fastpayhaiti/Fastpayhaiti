<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPay Withdraw v2</title>
<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  background:#eef2f7;
  padding:20px;
  color:#111827;
}

.container{
  max-width:430px;
  margin:auto;
}

.back{
  display:inline-block;
  margin-bottom:16px;
  color:#ff4d3d;
  text-decoration:none;
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.logo{
  font-size:30px;
  font-weight:bold;
  color:#ff5a3d;
}

.profile{
  width:46px;
  height:46px;
  border-radius:14px;
  background:linear-gradient(135deg,#ff5a3d,#ff7a59);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 6px 16px rgba(255,90,61,0.25);
}

.hero{
  background:linear-gradient(135deg,#111827,#374151);
  color:white;
  border-radius:26px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(17,24,39,0.22);
}

.hero h1{
  margin:0 0 10px 0;
  font-size:28px;
  line-height:1.2;
}

.hero p{
  margin:0;
  font-size:15px;
  line-height:1.6;
  opacity:0.98;
}

.section{
  background:white;
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 18px rgba(0,0,0,0.06);
  margin-bottom:18px;
}

.section h2{
  margin:0 0 14px 0;
  font-size:22px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
  color:#111827;
}

input, select, textarea{
  width:100%;
  padding:14px;
  border:1px solid #d1d5db;
  border-radius:14px;
  font-size:16px;
  background:white;
  margin-bottom:16px;
}

.summary{
  background:#f8fafc;
  border-radius:16px;
  padding:16px;
}

.summary-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
  font-size:14px;
}

.summary-row:last-child{
  margin-bottom:0;
}

.summary-label{
  color:#6b7280;
}

.summary-value{
  font-weight:bold;
  text-align:right;
}

.info-box{
  background:#fff7ed;
  color:#c2410c;
  border-radius:14px;
  padding:14px;
  font-size:14px;
  line-height:1.5;
  margin-bottom:16px;
}

.ok-box{
  background:#ecfdf3;
  color:#166534;
  border-radius:14px;
  padding:14px;
  font-size:14px;
  line-height:1.5;
  margin-bottom:16px;
}

.main-btn{
  display:block;
  width:100%;
  text-align:center;
  padding:15px;
  border:none;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
  margin-top:12px;
  cursor:pointer;
}

.orange-btn{
  background:#ff4d3d;
  color:white;
}

.dark-btn{
  background:#111827;
  color:white;
}

.notice{
  display:none;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  line-height:1.5;
  margin-bottom:14px;
}

.notice.success{
  background:#ecfdf3;
  color:#166534;
}

.notice.error{
  background:#fee2e2;
  color:#991b1b;
}
</style>
</head>
<body>

<div class="container">

<a href="wallet.html" class="back">← Back Wallet</a>

<div class="topbar">
  <div class="logo">FastPay</div>
  <div class="profile" id="profileLetter">U</div>
</div>

<div class="hero">
  <h1>Withdraw Funds</h1>
  <p>Soumèt yon demann retrè pou resevwa lajan ou sou bank oswa lòt sèvis ki disponib.</p>
</div>

<div class="section">
  <h2>Enfòmasyon retrè a</h2>

  <div id="noticeBox" class="notice"></div>
  <div id="walletStateBox" class="ok-box">Balans wallet ou disponib pou retrè.</div>

  <label>Non konplè</label>
  <input type="text" id="clientName" placeholder="Antre non ou">

  <label>Email</label>
  <input type="email" id="email" placeholder="Antre email ou">

  <label>Metòd retrè</label>
  <select id="method" onchange="updateSummary()">
    <option>Bank</option>
    <option>MonCash</option>
    <option>NatCash</option>
    <option>Cash Pickup</option>
    <option>Wallet Transfer</option>
  </select>

  <label>Bank / sèvis</label>
  <input type="text" id="bank" placeholder="Eg: Unibank, MonCash, NatCash">

  <label>Currency</label>
  <select id="currency" onchange="updateSummary()">
    <option>HTG</option>
    <option>USD</option>
    <option>EUR</option>
  </select>

  <label>Montan</label>
  <input type="number" id="amount" placeholder="Antre montan an" oninput="updateSummary()">

  <label>Non sou kont la</label>
  <input type="text" id="accountName" placeholder="Antre non sou kont la">

  <label>Nimewo kont / nimewo sèvis la</label>
  <input type="text" id="accountNumber" placeholder="Antre nimewo kont la">

  <label>Kalite kont</label>
  <select id="accountType">
    <option>Checking</option>
    <option>Savings</option>
    <option>Mobile Wallet</option>
    <option>Cash Pickup</option>
  </select>

  <label>Detay / nòt</label>
  <textarea id="details" rows="4" placeholder="Mete detay sou retrè a"></textarea>
</div>

<div class="section">
  <h2>Rezime demann lan</h2>

  <div class="summary">
    <div class="summary-row">
      <div class="summary-label">Client</div>
      <div class="summary-value" id="summaryClient">N/A</div>
    </div>

    <div class="summary-row">
      <div class="summary-label">Method</div>
      <div class="summary-value" id="summaryMethod">Bank</div>
    </div>

    <div class="summary-row">
      <div class="summary-label">Currency</div>
      <div class="summary-value" id="summaryCurrency">HTG</div>
    </div>

    <div class="summary-row">
      <div class="summary-label">Amount</div>
      <div class="summary-value" id="summaryAmount">0 HTG</div>
    </div>

    <div class="summary-row">
      <div class="summary-label">Wallet Balance</div>
      <div class="summary-value" id="summaryWallet">0 HTG</div>
    </div>
  </div>

  <button class="main-btn orange-btn" onclick="submitWithdraw()">Soumèt Demand Retrè</button>
  <a href="withdraw-history.html" class="main-btn dark-btn">Withdraw History</a>
</div>

</div>

<script src="app.js"></script>
<script>
function showNotice(message, type){
  const box = document.getElementById("noticeBox");
  box.style.display = "block";
  box.className = "notice " + type;
  box.innerHTML = message;
}

const currentUser = FastPayV2.getCurrentUser();

if(!currentUser){
  showNotice("Ou pa konekte. Tanpri login anvan.", "error");
  setTimeout(() => {
    window.location.href = "login.html";
  }, 1200);
} else {
  document.getElementById("profileLetter").innerHTML = currentUser.fullname.charAt(0).toUpperCase();
  document.getElementById("clientName").value = currentUser.fullname || "";
  document.getElementById("email").value = currentUser.email || "";
  document.getElementById("summaryWallet").innerHTML = (currentUser.balance || 0) + " HTG";
  document.getElementById("summaryClient").innerHTML = currentUser.fullname || "N/A";
}

function updateSummary(){
  const clientName = document.getElementById("clientName").value.trim() || "N/A";
  const method = document.getElementById("method").value;
  const currency = document.getElementById("currency").value;
  const amount = parseInt(document.getElementById("amount").value || "0");
  const walletBalance = parseInt((currentUser && currentUser.balance) || 0);

  document.getElementById("summaryClient").innerHTML = clientName;
  document.getElementById("summaryMethod").innerHTML = method;
  document.getElementById("summaryCurrency").innerHTML = currency;
  document.getElementById("summaryAmount").innerHTML = amount + " " + currency;
  document.getElementById("summaryWallet").innerHTML = walletBalance + " HTG";

  const stateBox = document.getElementById("walletStateBox");
  if(amount > walletBalance){
    stateBox.className = "info-box";
    stateBox.innerHTML = "Balans wallet ou pa ase pou retrè sa a.";
  } else {
    stateBox.className = "ok-box";
    stateBox.innerHTML = "Balans wallet ou disponib pou retrè sa a.";
  }
}

function submitWithdraw(){
  if(!currentUser){
    showNotice("Ou pa konekte.", "error");
    return;
  }

  const clientName = document.getElementById("clientName").value.trim();
  const email = document.getElementById("email").value.trim();
  const method = document.getElementById("method").value;
  const bank = document.getElementById("bank").value.trim();
  const currency = document.getElementById("currency").value;
  const amount = parseInt(document.getElementById("amount").value || "0");
  const accountName = document.getElementById("accountName").value.trim();
  const accountNumber = document.getElementById("accountNumber").value.trim();
  const accountType = document.getElementById("accountType").value;
  const details = document.getElementById("details").value.trim();

  if(!clientName || !email || !bank || !amount || !accountName || !accountNumber){
    showNotice("Tanpri ranpli tout enfòmasyon enpòtan yo.", "error");
    return;
  }

  if(amount <= 0){
    showNotice("Montan an pa valab.", "error");
    return;
  }

  if((currentUser.balance || 0) < amount){
    showNotice("Balans wallet ou pa ase pou retrè sa a.", "error");
    return;
  }

  const withdrawRequest = {
    id: FastPayV2.generateId("WDR"),
    userId: currentUser.id,
    clientName,
    email,
    method,
    bank,
    currency,
    amount: amount + " " + currency,
    amountValue: amount,
    accountName,
    accountNumber,
    accountType,
    details,
    status: "Pending Verification",
    date: new Date().toLocaleString()
  };

  const existingWithdraws = FastPayDB.get("fastpay_withdraws", []);
  existingWithdraws.unshift(withdrawRequest);
  FastPayDB.set("fastpay_withdraws", existingWithdraws);

  FastPayV2.addNotification({
    userId: currentUser.id,
    title: "Withdraw request submitted",
    text: "Nou resevwa demann retrè ou a pou " + amount + " " + currency + ".",
    type: "warning"
  });

  FastPayV2.addTransaction({
    userId: currentUser.id,
    service: "Withdraw Request",
    amount: "-" + amount + " " + currency,
    type: "withdraw-request",
    status: "pending",
    meta: {
      method: method,
      withdrawId: withdrawRequest.id
    }
  });

  showNotice("Demann retrè a anrejistre avèk siksè.", "success");

  setTimeout(() => {
    window.location.href = "withdraw-history.html";
  }, 1000);
}

updateSummary();
</script>

</body>
</html>
