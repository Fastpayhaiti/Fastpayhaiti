<!DOCTYPE html>
<html>
<head>
<title>FastPay Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial,sans-serif;
background:#eef2f7;
padding:20px;
margin:0;
}

.container{
max-width:420px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#ff4d3d;
text-decoration:none;
font-weight:bold;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
color:#111827;
font-size:28px;
}

p{
color:#6b7280;
}

label{
display:block;
margin-top:14px;
margin-bottom:6px;
font-weight:bold;
color:#222;
}

input, select, textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
margin-top:18px;
width:100%;
padding:14px;
background:#ff4d3d;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.note{
margin-top:16px;
font-size:14px;
color:#666;
background:#fff7f5;
padding:12px;
border-radius:10px;
}
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back">← Back Home</a>

  <div class="card">
    <h1>Place Your Order</h1>
    <p>Ranpli fòm sa a pou nou trete sèvis ou a.</p>

    <form onsubmit="sendOrder(event)">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="Antre non ou" required>

      <label>WhatsApp Number</label>
      <input type="text" id="whatsapp" placeholder="Eg: 50942778505" required>

      <label>Select Service</label>
      <select id="service" required>
        <option value="">-- Chwazi sèvis la --</option>
        <option>Netflix</option>
        <option>Prime Video</option>
        <option>Gift Card</option>
        <option>Top Up</option>
        <option>Virtual Card</option>
        <option>Wallet Deposit</option>
      </select>

      <label>Plan / Amount</label>
      <input type="text" id="amount" placeholder="Eg: Netflix Premium / $25 / 500 HTG" required>

      <label>Details</label>
      <textarea id="details" rows="4" placeholder="Mete detay sou lòd ou a"></textarea>

      <button type="submit">Send Order</button>
    </form>

    <div class="note">
      Apre ou peze <strong>Send Order</strong>, kliyan an ap voye enfòmasyon an sou WhatsApp.
    </div>
  </div>
</div>

<script>
function sendOrder(event){
  event.preventDefault();

  const fullname = document.getElementById("fullname").value;
  const whatsapp = document.getElementById("whatsapp").value;
  const service = document.getElementById("service").value;
  const amount = document.getElementById("amount").value;
  const details = document.getElementById("details").value;

  const phoneNumber = "50942778505";

  const message =
    "Bonjou FastPay,%0A%0A" +
    "Mwen vle pase yon lòd.%0A%0A" +
    "Non: " + fullname + "%0A" +
    "WhatsApp: " + whatsapp + "%0A" +
    "Sèvis: " + service + "%0A" +
    "Plan/Montan: " + amount + "%0A" +
    "Detay: " + details;

  window.open("https://wa.me/" + phoneNumber + "?text=" + message, "_blank");
}
</script>

</body>
</html>
