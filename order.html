<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastPay Checkout</title>
  <style>
    *{
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      margin:0;
      background:#eef2f7;
      padding:20px;
    }

    .container{
      max-width:420px;
      margin:auto;
    }

    .back{
      display:inline-block;
      margin-bottom:20px;
      color:#ff4d3d;
      text-decoration:none;
      font-weight:bold;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:18px;
      box-shadow:0 4px 14px rgba(0,0,0,0.08);
    }

    h1{
      margin-top:0;
      color:#111827;
      font-size:28px;
    }

    p{
      color:#6b7280;
    }

    label{
      display:block;
      margin-top:14px;
      margin-bottom:6px;
      font-weight:bold;
      color:#222;
    }

    input, select, textarea{
      width:100%;
      padding:12px;
      border:1px solid #ddd;
      border-radius:10px;
      font-size:16px;
    }

    button{
      margin-top:18px;
      width:100%;
      padding:14px;
      background:#ff4d3d;
      color:white;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .summary{
      margin-top:16px;
      background:#fff7f5;
      padding:14px;
      border-radius:12px;
      color:#444;
      font-size:14px;
    }

    .success{
      display:none;
      margin-top:20px;
      background:#ecfdf3;
      color:#166534;
      padding:16px;
      border-radius:12px;
      font-weight:bold;
      text-align:center;
    }

    .confirm-box{
      display:none;
      background:white;
      padding:20px;
      border-radius:18px;
      box-shadow:0 4px 14px rgba(0,0,0,0.08);
    }

    .status{
      display:inline-block;
      margin-top:10px;
      background:#fff7ed;
      color:#c2410c;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:bold;
    }

    .order-details{
      margin-top:18px;
      text-align:left;
      background:#f9fafb;
      padding:16px;
      border-radius:12px;
    }

    .order-details p{
      margin:8px 0;
      color:#111827;
    }

    .btn-link{
      display:block;
      margin-top:12px;
      width:100%;
      padding:14px;
      background:#ff4d3d;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      text-align:center;
    }

    .btn-secondary{
      background:#111827;
    }
  </style>
</head>
<body>

<div class="container">
  <div id="checkoutCard" class="card">
    <a href="index.html" class="back">← Back Home</a>

    <h1>Checkout</h1>
    <p>Ranpli enfòmasyon yo pou konfime lòd ou.</p>

    <form id="checkoutForm">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="Antre non ou" required>

      <label>WhatsApp Number</label>
      <input type="text" id="whatsapp" placeholder="Eg: 50942778505" required>

      <label>Select Service</label>
      <select id="service" required>
        <option value="">-- Chwazi sèvis la --</option>
        <option>Netflix</option>
        <option>Prime Video</option>
        <option>Gift Card</option>
        <option>Top Up</option>
        <option>Virtual Card</option>
        <option>Wallet Deposit</option>
        <option>Wallet Withdraw</option>
        <option>Wallet Transfer</option>
      </select>

      <label>Plan / Amount</label>
      <input type="text" id="amount" placeholder="Eg: Netflix Premium / $25 / 500 HTG" required>

      <label>Details</label>
      <textarea id="details" rows="4" placeholder="Mete detay sou lòd ou a"></textarea>

      <div class="summary" id="summaryBox">
        Pa gen lòd konfime ankò.
      </div>

      <button type="submit">Confirm Payment</button>
    </form>

    <div class="success" id="successMessage">
      Payment request saved successfully.
    </div>
  </div>

  <div id="confirmScreen" class="confirm-box">
    <a href="index.html" class="back">← Back Home</a>

    <h1>Order Confirmed</h1>
    <p>Nou resevwa demann ou a avèk siksè.</p>

    <div class="status">Status: Pending Review</div>

    <div class="order-details" id="orderDetails"></div>

    <a href="index.html" class="btn-link">Back Home</a>
    <a href="card.html" class="btn-link" id="cardBtn" style="display:none;">View Virtual Card Page</a>
    <a href="wallet.html" class="btn-link" id="walletBtn" style="display:none;">View Wallet</a>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const serviceParam = params.get("service");

  window.onload = function () {
    const serviceField = document.getElementById("service");
    const amountField = document.getElementById("amount");

    if(serviceParam === "netflix"){
      serviceField.value = "Netflix";
      amountField.value = "Netflix Plan";
    }

    if(serviceParam === "primevideo"){
      serviceField.value = "Prime Video";
      amountField.value = "Prime Video Plan";
    }

    if(serviceParam === "giftcards"){
      serviceField.value = "Gift Card";
      amountField.value = "Gift Card Amount";
    }

    if(serviceParam === "topup"){
      serviceField.value = "Top Up";
      amountField.value = "Top Up Amount";
    }

    if(serviceParam === "card"){
      serviceField.value = "Virtual Card";
      amountField.value = "$5";
    }

    if(serviceParam === "deposit"){
      serviceField.value = "Wallet Deposit";
      amountField.value = "500 HTG";
    }

    if(serviceParam === "withdraw"){
      serviceField.value = "Wallet Withdraw";
      amountField.value = "500 HTG";
    }

    if(serviceParam === "transfer"){
      serviceField.value = "Wallet Transfer";
      amountField.value = "500 HTG";
    }
  };

  document.getElementById("checkoutForm").addEventListener("submit", function(e){
    e.preventDefault();

    const fullname = document.getElementById("fullname").value;
    const whatsapp = document.getElementById("whatsapp").value;
    const service = document.getElementById("service").value;
    const amount = document.getElementById("amount").value;
    const details = document.getElementById("details").value;

    const orderId = "FP-" + Math.floor(Math.random() * 90000 + 10000);

    const orderData = {
      fullname,
      whatsapp,
      service,
      amount,
      details,
      orderId,
      status: "Pending Review",
      date: new Date().toLocaleString()
    };

    localStorage.setItem("fastpay_last_order", JSON.stringify(orderData));

    document.getElementById("summaryBox").innerHTML =
      "<strong>Service:</strong> " + service + "<br>" +
      "<strong>Client:</strong> " + fullname + "<br>" +
      "<strong>WhatsApp:</strong> " + whatsapp + "<br>" +
      "<strong>Plan/Montan:</strong> " + amount + "<br>" +
      "<strong>Details:</strong> " + details;

    document.getElementById("successMessage").style.display = "block";

    document.getElementById("checkoutCard").style.display = "none";
    document.getElementById("confirmScreen").style.display = "block";

    document.getElementById("orderDetails").innerHTML =
      "<p><strong>Order ID:</strong> " + orderId + "</p>" +
      "<p><strong>Client:</strong> " + fullname + "</p>" +
      "<p><strong>WhatsApp:</strong> " + whatsapp + "</p>" +
      "<p><strong>Service:</strong> " + service + "</p>" +
      "<p><strong>Plan / Amount:</strong> " + amount + "</p>" +
      "<p><strong>Status:</strong> Pending Review</p>" +
      "<p><strong>Date:</strong> " + orderData.date + "</p>";

    if(service === "Virtual Card"){
      document.getElementById("cardBtn").style.display = "block";
    }

    if(service === "Wallet Deposit" || service === "Wallet Withdraw" || service === "Wallet Transfer"){
      document.getElementById("walletBtn").style.display = "block";
    }
  });
</script>

</body>
</html>
