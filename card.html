<!DOCTYPE html>
<html>
<head>
<title>Virtual Card</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.card{
width:320px;
height:180px;
margin:auto;
border-radius:15px;
background:linear-gradient(135deg,#111,#333);
color:white;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.number{
font-size:20px;
letter-spacing:2px;
}

.name{
font-weight:bold;
}

button{
margin-top:20px;
padding:12px 20px;
background:#ff4d3d;
border:none;
color:white;
border-radius:8px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Your Virtual Card</h1>

<div class="card">

<div class="number">**** **** **** 4587</div>

<div class="name">LUCKYSTORE</div>

<div>12/29</div>

</div>

<br>

<button>Create New Card</button>

</body>
</html>
