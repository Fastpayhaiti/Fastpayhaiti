<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPay Admin Deposits</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{background:#05070c;color:#fff;min-height:100vh}
    .app{
      max-width:430px;margin:auto;min-height:100vh;padding:18px 18px 110px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .left-top{display:flex;align-items:center;gap:12px}
    .back-btn{
      width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,0.06);
      color:#fff;font-size:22px;text-decoration:none;display:flex;align-items:center;justify-content:center;
    }
    .page-title{font-size:24px;font-weight:800}
    .profile-avatar{
      width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.08);
      display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;
    }
    .hero-card{
      background:linear-gradient(135deg,#0d1117,#1c2330);
      border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:22px;margin-bottom:22px;
      box-shadow:0 22px 45px rgba(0,0,0,0.35);position:relative;overflow:hidden;
    }
    .hero-card::before{
      content:"";position:absolute;width:180px;height:180px;border-radius:50%;
      background:rgba(17,156,103,0.12);top:-40px;right:-40px;
    }
    .hero-label{color:#9ca3af;font-size:14px;margin-bottom:8px;position:relative;z-index:2}
    .hero-title{font-size:34px;font-weight:800;position:relative;z-index:2}
    .hero-sub{margin-top:10px;color:#8b93a7;font-size:14px;position:relative;z-index:2;line-height:1.5}
    .stats-grid{
      margin-top:18px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;position:relative;z-index:2;
    }
    .mini-box{
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);border-radius:18px;padding:14px;
    }
    .mini-label{color:#8b93a7;font-size:12px;margin-bottom:6px}
    .mini-value{font-size:20px;font-weight:800}
    .section-title{font-size:22px;font-weight:800;margin-bottom:14px}
    .list-box{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);border-radius:22px;padding:10px 16px;
    }
    .list-item{padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .list-item:last-child{border-bottom:none}
    .item-title{font-size:15px;font-weight:800;margin-bottom:6px;line-height:1.35}
    .item-sub{color:#8b93a7;font-size:13px;line-height:1.45;margin-bottom:4px;word-break:break-word}
    .item-amount{font-size:18px;font-weight:900;margin:8px 0}
    .proof-img{
      width:100%;max-height:220px;object-fit:cover;border-radius:16px;margin-top:10px;
      border:1px solid rgba(255,255,255,0.08);
    }
    .badge{
      display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;
      font-size:11px;font-weight:800;margin-top:8px;
    }
    .badge-success{background:rgba(17,156,103,0.18);color:#7ff0be}
    .badge-warning{background:rgba(245,158,11,0.18);color:#fcd34d}
    .badge-danger{background:rgba(217,60,75,0.18);color:#ffb4bf}
    .action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .btn{
      border:none;border-radius:14px;padding:12px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;
    }
    .green{background:#119c67}
    .red{background:#d93c4b}
    .empty{color:#8b93a7;font-size:14px;padding:10px 0}
    .bottom-nav{
      position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;
      background:#04060a;border-top:1px solid rgba(255,255,255,0.08);display:grid;
      grid-template-columns:repeat(5,1fr);padding:12px 8px 14px;z-index:1000;
    }
    .nav-item{
      text-decoration:none;color:#8b93a7;display:flex;flex-direction:column;align-items:center;gap:8px;
      font-size:12px;font-weight:600;
    }
    .nav-item i{font-size:23px}
    .nav-item.active{color:#3b4cff}
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="left-top">
      <a href="admin.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="page-title">Admin Deposits</div>
    </div>
    <div class="profile-avatar" id="profileLetter">A</div>
  </div>

  <div class="hero-card">
    <div class="hero-label">MonCash Deposit Requests</div>
    <div class="hero-title" id="depositCount">0</div>
    <div class="hero-sub">Verifye screenshot yo epi apwouve oswa rejte depo kliyan yo.</div>

    <div class="stats-grid">
      <div class="mini-box">
        <div class="mini-label">Pending</div>
        <div class="mini-value" id="pendingCount">0</div>
      </div>
      <div class="mini-box">
        <div class="mini-label">Approved</div>
        <div class="mini-value" id="approvedCount">0</div>
      </div>
      <div class="mini-box">
        <div class="mini-label">Rejected</div>
        <div class="mini-value" id="rejectedCount">0</div>
      </div>
      <div class="mini-box">
        <div class="mini-label">MonCash</div>
        <div class="mini-value">4277-8505</div>
      </div>
    </div>
  </div>

  <div class="section-title">Deposit Requests</div>
  <div class="list-box" id="depositBox">
    <div class="empty">Pa gen demann depo pou kounye a.</div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>
  <a href="statement.html" class="nav-item">
    <i class="fa-solid fa-arrow-rotate-left"></i>
    <span>Transactions</span>
  </a>
  <a href="giftcard.html" class="nav-item">
    <i class="fa-brands fa-bitcoin"></i>
    <span>Services</span>
  </a>
  <a href="card-dashboard.html" class="nav-item">
    <i class="fa-regular fa-credit-card"></i>
    <span>Cards</span>
  </a>
  <a href="admin.html" class="nav-item active">
    <i class="fa-solid fa-user-shield"></i>
    <span>Admin</span>
  </a>
</div>

<script src="app.js"></script>
<script>
  const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
  if(savedUser && savedUser.fullname){
    document.getElementById("profileLetter").innerText = savedUser.fullname.charAt(0).toUpperCase();
  }

  function getDeposits(){
    return JSON.parse(localStorage.getItem("fastpay_deposits") || "[]");
  }

  function saveDeposits(deposits){
    localStorage.setItem("fastpay_deposits", JSON.stringify(deposits));
  }

  function getUsers(){
    return JSON.parse(localStorage.getItem("fp_users") || "[]");
  }

  function saveUsers(users){
    localStorage.setItem("fp_users", JSON.stringify(users));
  }

  function getBadgeClass(status){
    const s = String(status || "").toLowerCase();
    if(s.includes("approved") || s.includes("completed") || s.includes("paid")) return "badge-success";
    if(s.includes("rejected")) return "badge-danger";
    return "badge-warning";
  }

  function approveDeposit(id){
    const deposits = getDeposits();
    const depIndex = deposits.findIndex(item => item.id === id);
    if(depIndex === -1) return;

    if(String(deposits[depIndex].status).toLowerCase() === "approved"){
      alert("Depo sa deja apwouve.");
      return;
    }

    deposits[depIndex].status = "Approved";
    saveDeposits(deposits);

    const users = getUsers();
    const userIndex = users.findIndex(u => u.id === deposits[depIndex].userId);
    if(userIndex !== -1){
      users[userIndex].balance = parseInt(users[userIndex].balance || 0) + parseInt(deposits[depIndex].amountValue || 0);
      saveUsers(users);

      const current = JSON.parse(localStorage.getItem("fastpay_user") || "null");
      if(current && current.id === users[userIndex].id){
        localStorage.setItem("fastpay_user", JSON.stringify(users[userIndex]));
      }
    }

    if(window.FastPayV2 && FastPayV2.addNotification){
      FastPayV2.addNotification({
        userId: deposits[depIndex].userId,
        title: "Deposit approved",
        text: "Depo MonCash ou a apwouve. Balans ou mete ajou.",
        type: "success"
      });
    }

    if(window.FastPayV2 && FastPayV2.addTransaction){
      FastPayV2.addTransaction({
        userId: deposits[depIndex].userId,
        service: "MonCash Deposit Approved",
        amount: "+" + (deposits[depIndex].amountValue || 0) + " HTG",
        type: "deposit-approved",
        status: "approved",
        meta: { reference: deposits[depIndex].reference }
      });
    }

    loadDeposits();
    alert("Depo a apwouve avèk siksè.");
  }

  function rejectDeposit(id){
    const deposits = getDeposits();
    const depIndex = deposits.findIndex(item => item.id === id);
    if(depIndex === -1) return;

    deposits[depIndex].status = "Rejected";
    saveDeposits(deposits);

    if(window.FastPayV2 && FastPayV2.addNotification){
      FastPayV2.addNotification({
        userId: deposits[depIndex].userId,
        title: "Deposit rejected",
        text: "Depo MonCash ou a rejte. Verifye referans lan epi eseye ankò.",
        type: "warning"
      });
    }

    loadDeposits();
    alert("Depo a rejte.");
  }

  function loadDeposits(){
    const deposits = getDeposits();

    document.getElementById("depositCount").innerText = deposits.length;
    document.getElementById("pendingCount").innerText =
      deposits.filter(d => String(d.status || "").toLowerCase().includes("pending")).length;
    document.getElementById("approvedCount").innerText =
      deposits.filter(d => String(d.status || "").toLowerCase().includes("approved")).length;
    document.getElementById("rejectedCount").innerText =
      deposits.filter(d => String(d.status || "").toLowerCase().includes("rejected")).length;

    const box = document.getElementById("depositBox");

    if(deposits.length === 0){
      box.innerHTML = '<div class="empty">Pa gen demann depo pou kounye a.</div>';
      return;
    }

    box.innerHTML = "";
    deposits.forEach(dep => {
      box.innerHTML += `
        <div class="list-item">
          <div class="item-title">${dep.fullname || "Client"} • ${dep.userEmail || ""}</div>
          <div class="item-sub">Sender: ${dep.senderName || "N/A"} / ${dep.senderPhone || "N/A"}</div>
          <div class="item-sub">Reference: ${dep.reference || "N/A"}</div>
          <div class="item-sub">${dep.date || ""}</div>
          <div class="item-sub">${dep.note || "Pa gen nòt"}</div>
          <div class="item-amount">${dep.amount || "0 HTG"}</div>
          <div class="badge ${getBadgeClass(dep.status)}">${dep.status || "Pending"}</div>
          ${dep.proofImage ? `<img src="${dep.proofImage}" class="proof-img" alt="Proof">` : ""}
          <div class="action-row">
            <button class="btn green" onclick="approveDeposit('${dep.id}')">Approve</button>
            <button class="btn red" onclick="rejectDeposit('${dep.id}')">Reject</button>
          </div>
        </div>
      `;
    });
  }

  loadDeposits();
</script>

</body>
  </html>
