<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPay Premium Register</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:#05070c;
      color:#fff;
    }

    .app{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      padding:24px 18px 30px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 28%),
        #05070c;
    }

    .brand-wrap{
      text-align:center;
      margin-bottom:28px;
    }

    .logo{
      width:74px;
      height:74px;
      margin:0 auto 16px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#2f3cff,#5d6bff);
      box-shadow:0 20px 40px rgba(47,60,255,0.30);
      font-size:30px;
      font-weight:800;
    }

    .title{
      font-size:34px;
      font-weight:800;
      margin-bottom:10px;
    }

    .sub{
      color:#8b93a7;
      font-size:14px;
      line-height:1.6;
    }

    .form-box{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:18px;
      box-shadow:0 22px 45px rgba(0,0,0,0.30);
    }

    .notice{
      display:none;
      margin-bottom:14px;
      padding:14px;
      border-radius:16px;
      font-size:14px;
      font-weight:700;
      line-height:1.5;
    }

    .notice.err{
      background:rgba(217,60,75,0.18);
      border:1px solid rgba(217,60,75,0.35);
      color:#ffb4bf;
    }

    .notice.ok{
      background:rgba(17,156,103,0.18);
      border:1px solid rgba(17,156,103,0.35);
      color:#7ff0be;
    }

    label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin-bottom:8px;
      color:#d7deee;
    }

    .input-wrap{
      position:relative;
      margin-bottom:14px;
    }

    .input-wrap i{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:#7f879b;
      font-size:15px;
    }

    input{
      width:100%;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      color:#ffffff;
      padding:15px 14px 15px 42px;
      font-size:15px;
      outline:none;
    }

    input::placeholder{
      color:#7f879b;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:18px;
      background:#2f3cff;
      color:#fff;
      font-size:16px;
      font-weight:800;
      padding:16px;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(47,60,255,0.35);
      margin-top:6px;
    }

    .extra{
      margin-top:16px;
      text-align:center;
      color:#8b93a7;
      font-size:14px;
      line-height:1.6;
    }

    .extra a{
      color:#cfd5ff;
      text-decoration:none;
      font-weight:800;
    }

    .mini-links{
      margin-top:18px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .mini-link{
      text-decoration:none;
      text-align:center;
      padding:14px;
      border-radius:16px;
      color:#fff;
      font-size:14px;
      font-weight:700;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>

<div class="app">
  <div class="brand-wrap">
    <div class="logo">F</div>
    <div class="title">Register</div>
    <div class="sub">Kreye kont FastPay ou pou jere wallet ou, sèvis ou yo, ak kat dijital ou yo.</div>
  </div>

  <div class="form-box">
    <div id="noticeBox" class="notice err"></div>

    <label>Full Name</label>
    <div class="input-wrap">
      <i class="fa-regular fa-user"></i>
      <input type="text" id="fullname" placeholder="Antre non konplè ou">
    </div>

    <label>Email</label>
    <div class="input-wrap">
      <i class="fa-regular fa-envelope"></i>
      <input type="email" id="email" placeholder="Antre email ou">
    </div>

    <label>Phone</label>
    <div class="input-wrap">
      <i class="fa-solid fa-phone"></i>
      <input type="text" id="phone" placeholder="Antre nimewo telefòn ou">
    </div>

    <label>Password</label>
    <div class="input-wrap">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="password" placeholder="Kreye modpas ou">
    </div>

    <button class="btn" onclick="registerUser()">Create Account</button>

    <div class="extra">
      Ou deja gen kont? <a href="login.html">Konekte</a>
    </div>

    <div class="mini-links">
      <a href="index.html" class="mini-link">Home</a>
      <a href="login.html" class="mini-link">Login</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  function showNotice(message, isError = true){
    const box = document.getElementById("noticeBox");
    box.style.display = "block";
    box.className = isError ? "notice err" : "notice ok";
    box.innerText = message;
  }

  function registerUser(){
    const fullname = document.getElementById("fullname").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!fullname || !email || !phone || !password){
      showNotice("Tanpri ranpli tout chan yo.");
      return;
    }

    if(window.FastPayV2 && FastPayV2.registerUser){
      const result = FastPayV2.registerUser({
        fullname,
        email,
        phone,
        password
      });

      if(result && result.success){
        showNotice("Kont lan kreye avèk siksè.", false);
        setTimeout(() => {
          window.location.href = "login.html";
        }, 700);
      } else {
        showNotice((result && result.message) || "Pa rive kreye kont lan.");
      }
      return;
    }

    const users = JSON.parse(localStorage.getItem("fp_users") || "[]");
    const exists = users.find(u => String(u.email || "").toLowerCase() === email);

    if(exists){
      showNotice("Email sa deja egziste.");
      return;
    }

    const newUser = {
      id: "USER_" + Date.now(),
      fullname,
      email,
      phone,
      password,
      balance: 0,
      status: "Active",
      createdAt: new Date().toLocaleString()
    };

    users.unshift(newUser);
    localStorage.setItem("fp_users", JSON.stringify(users));

    showNotice("Kont lan kreye avèk siksè.", false);

    setTimeout(() => {
      window.location.href = "login.html";
    }, 700);
  }
</script>

</body>
</html>
