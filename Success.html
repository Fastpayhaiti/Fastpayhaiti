<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Success - FastPay</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      background:#05070c;
      color:#ffffff;
      min-height:100vh;
    }

    .app{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      padding:18px 18px 120px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .back-btn{
      width:46px;
      height:46px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      color:#ffffff;
      font-size:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      backdrop-filter:blur(10px);
    }

    .profile-avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      color:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:bold;
    }

    .hero-card,
    .detail-card,
    .json-card{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:18px;
      backdrop-filter:blur(10px);
      margin-bottom:18px;
    }

    .success-icon{
      width:86px;
      height:86px;
      border-radius:50%;
      background:rgba(34,197,94,0.14);
      color:#4ade80;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      margin:4px auto 18px;
      border:1px solid rgba(74,222,128,0.18);
    }

    .title{
      font-size:30px;
      font-weight:800;
      text-align:center;
      margin-bottom:10px;
    }

    .sub{
      color:#8b93a7;
      font-size:15px;
      line-height:1.55;
      text-align:center;
      margin-bottom:14px;
    }

    .status-pill{
      margin:0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:rgba(34,197,94,0.14);
      color:#4ade80;
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:700;
    }

    .center-wrap{
      text-align:center;
    }

    .section-title{
      font-size:20px;
      font-weight:800;
      margin-bottom:12px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .row:last-child{
      border-bottom:none;
    }

    .label{
      color:#8b93a7;
      font-size:14px;
    }

    .value{
      font-size:15px;
      font-weight:700;
      text-align:right;
      word-break:break-word;
      max-width:60%;
    }

    .primary-btn,
    .secondary-btn{
      display:block;
      width:100%;
      border:none;
      border-radius:18px;
      font-size:17px;
      font-weight:700;
      padding:17px;
      cursor:pointer;
      text-decoration:none;
      text-align:center;
      margin-top:12px;
    }

    .primary-btn{
      background:#2f3cff;
      color:#fff;
      box-shadow:0 14px 30px rgba(47,60,255,0.35);
    }

    .secondary-btn{
      background:#131a2c;
      color:#ffffff;
      border:1px solid rgba(255,255,255,0.08);
    }

    .json-card{
      white-space:pre-wrap;
      word-break:break-word;
      font-size:13px;
      color:#dbe4ff;
      line-height:1.5;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      width:100%;
      max-width:430px;
      background:#04060a;
      border-top:1px solid rgba(255,255,255,0.08);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      padding:12px 8px 14px;
      z-index:1000;
    }

    .nav-item{
      text-decoration:none;
      color:#8b93a7;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:600;
    }

    .nav-item i{
      font-size:23px;
    }

    .nav-item.active{
      color:#3b4cff;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a href="dashboard.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <div class="profile-avatar" id="profileLetter">A</div>
    </div>

    <div class="hero-card">
      <div class="success-icon">
        <i class="fa-solid fa-check"></i>
      </div>

      <div class="title">Siksè!</div>
      <div class="sub" id="successMessage">
        Tranzaksyon ou a fini avèk siksè.
      </div>

      <div class="center-wrap">
        <div class="status-pill">
          <i class="fa-solid fa-bolt"></i>
          <span id="statusText">Payment + Delivery Success</span>
        </div>
      </div>
    </div>

    <div class="detail-card">
      <div class="section-title">Detay order la</div>

      <div class="row">
        <div class="label">Order ID</div>
        <div class="value" id="orderIdText">--</div>
      </div>

      <div class="row">
        <div class="label">Provider Reference</div>
        <div class="value" id="providerText">--</div>
      </div>

      <div class="row">
        <div class="label">Eta</div>
        <div class="value" id="successStateText">Delivered</div>
      </div>

      <div class="row">
        <div class="label">Mesaj</div>
        <div class="value" id="messageText">--</div>
      </div>

      <a href="dashboard.html" class="primary-btn">Retounen sou Dashboard</a>
      <a href="services.html" class="secondary-btn">Fè yon lòt sèvis</a>
    </div>

    <div class="json-card" id="jsonBox">Done tranzaksyon an ap parèt isit...</div>
  </div>

  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>

    <a href="statement.html" class="nav-item">
      <i class="fa-solid fa-arrow-rotate-left"></i>
      <span>Transactions</span>
    </a>

    <a href="services.html" class="nav-item active">
      <i class="fa-brands fa-bitcoin"></i>
      <span>Services</span>
    </a>

    <a href="card-dashboard.html" class="nav-item">
      <i class="fa-regular fa-credit-card"></i>
      <span>Cards</span>
    </a>

    <a href="wallet.html" class="nav-item">
      <i class="fa-solid fa-wallet"></i>
      <span>Wallet</span>
    </a>
  </div>

  <script>
    const savedUser = JSON.parse(localStorage.getItem("fastpay_user") || "null");
    const lastOrder = JSON.parse(localStorage.getItem("fastpay_last_order") || "null");

    const profileLetter = document.getElementById("profileLetter");
    if (savedUser && savedUser.fullname) {
      profileLetter.innerText = savedUser.fullname.charAt(0).toUpperCase();
    }

    const jsonBox = document.getElementById("jsonBox");

    if (!lastOrder) {
      document.getElementById("successMessage").innerText =
        "Pa gen done order ki sove pou afiche.";
      document.getElementById("statusText").innerText = "No Data";
      document.getElementById("messageText").innerText = "No transaction data found";
      jsonBox.innerText = "Pa gen okenn done tranzaksyon ki disponib.";
    } else {
      document.getElementById("orderIdText").innerText = lastOrder.orderId || "--";
      document.getElementById("providerText").innerText = lastOrder.providerReference || "--";
      document.getElementById("messageText").innerText = lastOrder.message || "--";
      document.getElementById("successMessage").innerText =
        lastOrder.message || "Tranzaksyon ou a fini avèk siksè.";
      document.getElementById("statusText").innerText =
        lastOrder.success ? "Payment + Delivery Success" : "Processed";
      document.getElementById("successStateText").innerText =
        lastOrder.success ? "Delivered" : "Unknown";

      jsonBox.innerText = JSON.stringify(lastOrder, null, 2);
    }
  </script>
</body>
  </html>
