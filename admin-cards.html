<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPay Admin Cards v2</title>
<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  background:#eef2f7;
  padding:20px;
  color:#111827;
}

.container{
  max-width:430px;
  margin:auto;
}

.back{
  display:inline-block;
  margin-bottom:20px;
  color:#ff4d3d;
  text-decoration:none;
  font-weight:bold;
}

.header{
  background:linear-gradient(135deg,#111827,#374151);
  color:white;
  padding:22px;
  border-radius:22px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(17,24,39,0.22);
}

.header h1{
  margin:0;
  font-size:30px;
}

.header p{
  margin:8px 0 0;
  opacity:0.96;
  line-height:1.5;
}

.notice{
  display:none;
  background:#ecfdf3;
  color:#166534;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  margin-bottom:16px;
  line-height:1.5;
}

.notice.error{
  background:#fee2e2;
  color:#991b1b;
}

.box{
  background:white;
  border-radius:20px;
  padding:18px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
  margin-bottom:16px;
}

.box h2{
  margin:0 0 14px 0;
  font-size:22px;
  color:#111827;
}

.empty{
  color:#6b7280;
  font-size:15px;
}

.item{
  padding:14px 0;
  border-bottom:1px solid #eee;
}

.item:last-child{
  border-bottom:none;
}

.item-title{
  font-weight:bold;
  color:#111827;
  font-size:16px;
}

.item-sub{
  color:#6b7280;
  font-size:14px;
  margin-top:4px;
  line-height:1.45;
}

.status{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
  margin-top:8px;
}

.status-pending{
  background:#fff7ed;
  color:#c2410c;
}

.status-approved{
  background:#ecfdf3;
  color:#166534;
}

.status-rejected{
  background:#fee2e2;
  color:#991b1b;
}

.status-frozen{
  background:#eff6ff;
  color:#1d4ed8;
}

.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.action-row-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.mini-btn{
  border:none;
  border-radius:12px;
  padding:10px 12px;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}

.approve-btn{
  background:#10b981;
  color:white;
}

.reject-btn{
  background:#ef4444;
  color:white;
}

.freeze-btn{
  background:#1d4ed8;
  color:white;
}

.activate-btn{
  background:#047857;
  color:white;
}

.load-btn{
  background:#ff4d3d;
  color:white;
}

.btn{
  display:block;
  width:100%;
  text-align:center;
  padding:14px;
  border:none;
  border-radius:14px;
  text-decoration:none;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
}

.btn-primary{
  background:#ff4d3d;
  color:white;
}

.btn-secondary{
  background:#111827;
  color:white;
}
</style>
</head>
<body>

<div class="container">
  <a href="admin.html" class="back">← Back Admin</a>

  <div class="header">
    <h1>Admin Cards v2</h1>
    <p>Apwouve, rejte, aktive, bloke, epi jere kat kliyan yo nan FastPay v2.</p>
  </div>

  <div id="noticeBox" class="notice"></div>

  <div class="box">
    <h2>Card Requests v2</h2>
    <div id="requestBox" class="empty">Pa gen demann kat pou kounye a.</div>
  </div>

  <div class="box">
    <h2>User Cards</h2>
    <div id="cardsBox" class="empty">Pa gen kat aktif pou kounye a.</div>
  </div>

  <button class="btn btn-primary" onclick="loadAll()">Refresh Cards</button>
  <button class="btn btn-secondary" onclick="clearCardRequests()">Clear Card Requests</button>
</div>

<script src="app.js"></script>
<script>
function showNotice(message, isError = false){
  const box = document.getElementById("noticeBox");
  box.style.display = "block";
  box.className = isError ? "notice error" : "notice";
  box.innerHTML = message;
}

function getStatusClass(status){
  const value = String(status || "").toLowerCase();

  if(value.includes("approved") || value.includes("active") || value.includes("paid")){
    return "status-approved";
  }
  if(value.includes("rejected")){
    return "status-rejected";
  }
  if(value.includes("frozen")){
    return "status-frozen";
  }
  return "status-pending";
}

function getUsers(){
  return FastPayDB.get("fp_users", []);
}

function getRequests(){
  return FastPayDB.get("fp_card_requests_v2", []);
}

function saveRequests(requests){
  FastPayDB.set("fp_card_requests_v2", requests);
}

function getCards(){
  return FastPayDB.get("fp_cards", []);
}

function saveCards(cards){
  FastPayDB.set("fp_cards", cards);
}

function getUserById(userId){
  const users = getUsers();
  return users.find(u => u.id === userId) || null;
}

function createCardForUser(request){
  let cards = getCards();
  const existing = cards.find(card => card.userId === request.userId);

  if(existing){
    return existing;
  }

  const cardData = {
    id: FastPayV2.generateId("CARD"),
    userId: request.userId,
    number: "**** **** **** " + Math.floor(Math.random() * 9000 + 1000),
    name: (request.fullname || "FASTPAY USER").toUpperCase(),
    exp: "12/29",
    cvv: "392",
    brand: (request.network || "Visa").toUpperCase(),
    status: "Active",
    balance: 0,
    cardType: request.cardType || "Virtual",
    currency: request.currency || "USD",
    createdAt: new Date().toLocaleString()
  };

  cards.unshift(cardData);
  saveCards(cards);
  return cardData;
}

function approveRequest(index){
  let requests = getRequests();

  if(!requests[index]){
    showNotice("Demann nan pa jwenn.", true);
    return;
  }

  requests[index].status = "Approved";
  saveRequests(requests);

  const createdCard = createCardForUser(requests[index]);

  FastPayV2.addNotification({
    userId: requests[index].userId,
    title: "Card approved",
    text: "Demann kat ou a apwouve. Kat ou a deja aktif.",
    type: "success"
  });

  FastPayV2.addTransaction({
    userId: requests[index].userId,
    service: "Card Approved - " + (createdCard.brand || "CARD"),
    amount: "0 HTG",
    type: "card-approved",
    status: "approved",
    meta: {
      cardId: createdCard.id,
      requestId: requests[index].id
    }
  });

  loadAll();
  showNotice("Demann kat la apwouve avèk siksè.");
}

function rejectRequest(index){
  let requests = getRequests();

  if(!requests[index]){
    showNotice("Demann nan pa jwenn.", true);
    return;
  }

  requests[index].status = "Rejected";
  saveRequests(requests);

  FastPayV2.addNotification({
    userId: requests[index].userId,
    title: "Card rejected",
    text: "Demann kat ou a rejte. Tcheke detay yo epi eseye ankò.",
    type: "warning"
  });

  loadAll();
  showNotice("Demann kat la rejte.");
}

function freezeCard(cardId){
  let cards = getCards();
  const index = cards.findIndex(card => card.id === cardId);

  if(index === -1){
    showNotice("Kat la pa jwenn.", true);
    return;
  }

  cards[index].status = "Frozen";
  saveCards(cards);

  FastPayV2.addNotification({
    userId: cards[index].userId,
    title: "Card frozen",
    text: "Admin lan freeze kat ou a.",
    type: "warning"
  });

  loadAll();
  showNotice("Kat la freeze avèk siksè.");
}

function activateCard(cardId){
  let cards = getCards();
  const index = cards.findIndex(card => card.id === cardId);

  if(index === -1){
    showNotice("Kat la pa jwenn.", true);
    return;
  }

  cards[index].status = "Active";
  saveCards(cards);

  FastPayV2.addNotification({
    userId: cards[index].userId,
    title: "Card activated",
    text: "Kat ou a aktive ankò pa admin lan.",
    type: "success"
  });

  loadAll();
  showNotice("Kat la aktive avèk siksè.");
}

function loadCardBalance(cardId){
  let cards = getCards();
  const index = cards.findIndex(card => card.id === cardId);

  if(index === -1){
    showNotice("Kat la pa jwenn.", true);
    return;
  }

  const amountText = prompt("Antre montan pou mete sou kat la (HTG):");
  if(amountText === null) return;

  const amount = parseInt(amountText);
  if(!amount || amount <= 0){
    showNotice("Montan an pa valab.", true);
    return;
  }

  cards[index].balance = parseInt(cards[index].balance || 0) + amount;
  saveCards(cards);

  FastPayV2.addNotification({
    userId: cards[index].userId,
    title: "Card loaded",
    text: "Admin lan ajoute " + amount + " HTG sou kat ou a.",
    type: "success"
  });

  FastPayV2.addTransaction({
    userId: cards[index].userId,
    service: "Admin Card Load - " + (cards[index].brand || "CARD"),
    amount: "+" + amount + " HTG",
    type: "card-load-admin",
    status: "completed",
    meta: {
      cardId: cards[index].id
    }
  });

  loadAll();
  showNotice("Kat la rechaje avèk siksè ak " + amount + " HTG.");
}

function renderRequests(){
  const box = document.getElementById("requestBox");
  const requests = getRequests();

  if(requests.length === 0){
    box.className = "empty";
    box.innerHTML = "Pa gen demann kat pou kounye a.";
    return;
  }

  box.className = "";
  box.innerHTML = "";

  requests.forEach((item, index) => {
    const user = getUserById(item.userId);
    const status = item.status || "pending";
    const statusClass = getStatusClass(status);

    box.innerHTML += `
      <div class="item">
        <div class="item-title">${item.fullname || "Client"} - ${item.cardType || "Virtual Card"}</div>
        <div class="item-sub"><strong>User ID:</strong> ${item.userId || "N/A"}</div>
        <div class="item-sub"><strong>Email:</strong> ${item.email || (user ? user.email : "N/A")}</div>
        <div class="item-sub"><strong>Network:</strong> ${item.network || "N/A"}</div>
        <div class="item-sub"><strong>Currency:</strong> ${item.currency || "N/A"}</div>
        <div class="item-sub"><strong>Payment Method:</strong> ${item.paymentMethod || "N/A"}</div>
        <div class="item-sub"><strong>Amount:</strong> ${item.amount || "N/A"}</div>
        <div class="item-sub"><strong>Date:</strong> ${item.date || "N/A"}</div>
        <div class="status ${statusClass}">${status}</div>
        <div class="action-row">
          <button class="mini-btn approve-btn" onclick="approveRequest(${index})">Approve</button>
          <button class="mini-btn reject-btn" onclick="rejectRequest(${index})">Reject</button>
        </div>
      </div>
    `;
  });
}

function renderCards(){
  const box = document.getElementById("cardsBox");
  const cards = getCards();

  if(cards.length === 0){
    box.className = "empty";
    box.innerHTML = "Pa gen kat aktif pou kounye a.";
    return;
  }

  box.className = "";
  box.innerHTML = "";

  cards.forEach(card => {
    const user = getUserById(card.userId);
    const status = card.status || "Active";
    const statusClass = getStatusClass(status);

    box.innerHTML += `
      <div class="item">
        <div class="item-title">${card.name || "FASTPAY USER"} - ${card.cardType || "Virtual Card"}</div>
        <div class="item-sub"><strong>User:</strong> ${user ? user.fullname : "N/A"}</div>
        <div class="item-sub"><strong>Email:</strong> ${user ? user.email : "N/A"}</div>
        <div class="item-sub"><strong>Brand:</strong> ${card.brand || "Visa"}</div>
        <div class="item-sub"><strong>Number:</strong> ${card.number || "**** **** **** 4587"}</div>
        <div class="item-sub"><strong>EXP:</strong> ${card.exp || "12/29"}</div>
        <div class="item-sub"><strong>Currency:</strong> ${card.currency || "USD"}</div>
        <div class="item-sub"><strong>Balance:</strong> ${card.balance || 0} HTG</div>
        <div class="item-sub"><strong>Created:</strong> ${card.createdAt || "N/A"}</div>
        <div class="status ${statusClass}">${status}</div>
        <div class="action-row-3">
          <button class="mini-btn freeze-btn" onclick="freezeCard('${card.id}')">Freeze</button>
          <button class="mini-btn activate-btn" onclick="activateCard('${card.id}')">Activate</button>
          <button class="mini-btn load-btn" onclick="loadCardBalance('${card.id}')">Load</button>
        </div>
      </div>
    `;
  });
}

function loadAll(){
  renderRequests();
  renderCards();
}

function clearCardRequests(){
  FastPayDB.remove("fp_card_requests_v2");
  loadAll();
}

loadAll();
</script>

</body>
  </html>
