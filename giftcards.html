<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FastPay Gift Cards</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0;
      background: #0b1020;
      color: white;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    p.sub {
      text-align: center;
      color: #aab3c5;
      margin-bottom: 20px;
    }
    .card {
      background: #11182d;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .result {
      background: #0f1530;
      border-radius: 12px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      color: #dce6ff;
      margin-top: 20px;
    }
    button {
      padding: 12px 14px;
      background: #4f6bff;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gift Cards</h1>
    <p class="sub">Lis gift cards yo</p>

    <div id="giftcardsList"></div>
    <div class="result" id="resultBox">Rezilta ap parèt isit...</div>
  </div>

  <script>
    const API_BASE = "https://fastpayhaiti.onrender.com";

    async function loadGiftCards() {
      const list = document.getElementById("giftcardsList");
      const resultBox = document.getElementById("resultBox");
      list.innerHTML = "<div class='card'>Ap chaje gift cards yo...</div>";

      try {
        const res = await fetch(`${API_BASE}/api/reloadly/giftcards/products`);
        const data = await res.json();
        const products = data.content || data || [];

        list.innerHTML = "";

        if (!Array.isArray(products) || products.length === 0) {
          list.innerHTML = "<div class='card'>Pa gen gift card jwenn.</div>";
          resultBox.innerText = JSON.stringify(data, null, 2);
          return;
        }

        products.slice(0, 20).forEach(product => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <h3>${product.productName || product.name || "Gift Card"}</h3>
            <p>Product ID: ${product.productId || product.id || "N/A"}</p>
            <p>Country: ${product.country?.name || product.countryCode || "N/A"}</p>
            <button onclick="buyGiftCard('${product.productId || product.id}')">Achte</button>
          `;
          list.appendChild(div);
        });

        resultBox.innerText = "Gift cards yo chaje byen.";
      } catch (error) {
        resultBox.innerText = "Erè: " + error.message;
      }
    }

    async function buyGiftCard(productId) {
      const recipientEmail = prompt("Mete email kliyan an:");
      if (!recipientEmail) return;

      const recipientName = prompt("Mete non kliyan an:");
      if (!recipientName) return;

      const unitPrice = prompt("Mete montan gift card la:");
      if (!unitPrice) return;

      try {
        const res = await fetch(`${API_BASE}/api/reloadly/giftcards/order`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            productId,
            quantity: 1,
            unitPrice,
            recipientEmail,
            recipientName,
            senderName: "FastPay Haiti",
            customIdentifier: "GC-" + Date.now()
          })
        });

        const data = await res.json();
        document.getElementById("resultBox").innerText = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById("resultBox").innerText = "Erè acha gift card: " + error.message;
      }
    }

    loadGiftCards();
  </script>
</body>
</html>
