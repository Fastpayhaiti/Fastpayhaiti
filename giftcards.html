<script>
const API = "https://fastpayhaiti.onrender.com";

async function loadCards(){
  const res = await fetch(`${API}/api/reloadly/giftcards`);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.content.forEach(item => {
    list.innerHTML += `
      <div>
        <b>${item.name}</b>
        <button onclick="buy(${item.productId})">Buy</button>
      </div>
    `;
  });
}

async function buy(id){
  const email = prompt("Email:");
  const name = prompt("Name:");
  const amount = prompt("Amount:");

  const res = await fetch(`${API}/api/reloadly/giftcards`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      productId:id,
      email,
      name,
      amount
    })
  });

  alert("Gift card achte ✔️");
}

loadCards();
</script>

<div id="list"></div>
