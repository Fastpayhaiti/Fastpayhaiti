<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gift Cards - FastPay</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="menu-root"></div>

  <div class="page-content">
    <div class="header-card">
      <h1>Gift Cards</h1>
      <div class="sub">Gade epi achte gift cards sou FastPay.</div>
    </div>

    <div class="panel">
      <div id="giftcardsList" class="result">Ap chaje gift cards yo...</div>
    </div>
  </div>

  <div id="nav-root"></div>

  <script src="js/app.js"></script>
  <script>
    injectLayout("services");

    async function loadGiftCards() {
      const box = document.getElementById("giftcardsList");
      try {
        const res = await fetch(`${API_BASE}/api/reloadly/giftcards/products`);
        const data = await res.json();
        box.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        box.textContent = "Erè: " + error.message;
      }
    }

    loadGiftCards();
  </script>
</body>
</html>
