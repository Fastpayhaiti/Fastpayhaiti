<!DOCTYPE html>
<html>
<head>
<title>Gift Cards</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
text-align:center;
}
.card{
background:white;
padding:20px;
margin:15px auto;
border-radius:12px;
max-width:320px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
button{
background:#ff4d3d;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
}
</style>
</head>
<body>

<h1>Gift Cards</h1>

<div class="card">
<h2>Apple Gift Card</h2>
<p>$10 / $25 / $50</p>
<button>Buy Now</button>
</div>

<div class="card">
<h2>Google Play</h2>
<p>$10 / $25 / $50</p>
<button>Buy Now</button>
</div>

<div class="card">
<h2>Amazon</h2>
<p>$10 / $25 / $100</p>
<button>Buy Now</button>
</div>

<div class="card">
<h2>Steam</h2>
<p>$20 / $50</p>
<button>Buy Now</button>
</div>

</body>
  </html>
