<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FastPay Gift Cards</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0;
      background: #050816;
      color: white;
      padding: 20px;
    }
    .page-content {
      padding-bottom: 95px;
      max-width: 780px;
      margin: 0 auto;
    }
    .header-card {
      background: linear-gradient(180deg, #0b1438, #081127);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      font-weight: 800;
    }
    .sub {
      color: #aeb9d6;
      font-size: 15px;
      line-height: 1.45;
    }
    .list {
      display: grid;
      gap: 14px;
    }
    .card {
      background: linear-gradient(180deg, #0b1020, #090d18);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 18px;
    }
    .title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .meta {
      font-size: 14px;
      color: #b8c4e0;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    button {
      padding: 12px 14px;
      background: #4f6bff;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .result {
      background: #0f1530;
      border-radius: 12px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      color: #dce6ff;
      margin-top: 20px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #050816;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      z-index: 9999;
    }
    .bottom-nav a {
      text-decoration: none;
      color: #a7b0c5;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 58px;
    }
    .bottom-nav a svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }
    .bottom-nav a.active {
      color: #4f6bff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="page-content">
    <div class="header-card">
      <h1>Gift Cards</h1>
      <div class="sub">
        Gade epi achte gift cards dijital sou FastPay.
      </div>
    </div>

    <div class="list" id="giftcardsList">
      <div class="card">Ap chaje gift cards yo...</div>
    </div>

    <div class="result" id="resultBox">Rezilta ap parèt isit...</div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" id="menu-home">
      <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3l9-8z"></path></svg>
      <span>Home</span>
    </a>

    <a href="transactions.html" id="menu-transactions">
      <svg viewBox="0 0 24 24"><path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6a6 6 0 01-6 6 6 6 0 01-5.65-4H4.26A8.003 8.003 0 0012 21a8 8 0 000-16z"></path></svg>
      <span>Transactions</span>
    </a>

    <a href="services.html" id="menu-services" class="active">
      <svg viewBox="0 0 24 24"><path d="M13 3c-1.1 0-2 .9-2 2v6H9c-1.1 0-2 .9-2 2v3h2v-3h2v6h2v-6h2v3h2v-3c0-1.1-.9-2-2-2h-2V5c0-1.1-.9-2-2-2z"></path></svg>
      <span>Services</span>
    </a>

    <a href="cards.html" id="menu-cards">
      <svg viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4H4V6h16v2zm-10 8H4v-2h6v2z"></path></svg>
      <span>Cards</span>
    </a>

    <a href="wallet.html" id="menu-wallet">
      <svg viewBox="0 0 24 24"><path d="M21 7H5C3.9 7 3 7.9 3 9v8c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm0 10H5V9h16v8zM17 11a2 2 0 100 4 2 2 0 000-4zM5 5h13V3H5C3.9 3 3 3.9 3 5v1h2V5z"></path></svg>
      <span>Wallet</span>
    </a>
  </div>

  <script>
    const API_BASE = "https://fastpayhaiti.onrender.com";

    async function loadGiftCards() {
      const list = document.getElementById("giftcardsList");
      const resultBox = document.getElementById("resultBox");

      try {
        const res = await fetch(`${API_BASE}/api/reloadly/giftcards/products`);
        const data = await res.json();

        const products = data.content || data || [];
        list.innerHTML = "";

        if (!Array.isArray(products) || products.length === 0) {
          list.innerHTML = "<div class='card'>Pa gen gift cards jwenn.</div>";
          resultBox.innerText = JSON.stringify(data, null, 2);
          return;
        }

        products.slice(0, 20).forEach(product => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <div class="title">${product.productName || product.name || "Gift Card"}</div>
            <div class="meta">
              Product ID: ${product.productId || product.id || "N/A"}<br>
              Country: ${product.country?.name || product.countryCode || "N/A"}
            </div>
            <button onclick="buyGiftCard('${product.productId || product.id}')">Achte</button>
          `;
          list.appendChild(div);
        });

        resultBox.innerText = "Gift cards yo chaje byen.";
      } catch (error) {
        document.getElementById("giftcardsList").innerHTML =
          "<div class='card'>Gen erè pandan chajman an.</div>";
        resultBox.innerText = "Erè: " + error.message;
      }
    }

    async function buyGiftCard(productId) {
      const recipientEmail = prompt("Mete email kliyan an:");
      if (!recipientEmail) return;

      const recipientName = prompt("Mete non kliyan an:");
      if (!recipientName) return;

      const unitPrice = prompt("Mete montan gift card la:");
      if (!unitPrice) return;

      try {
        const res = await fetch(`${API_BASE}/api/reloadly/giftcards/order`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            productId,
            quantity: 1,
            unitPrice,
            recipientEmail,
            recipientName,
            senderName: "FastPay Haiti",
            customIdentifier: "GC-" + Date.now()
          })
        });

        const data = await res.json();
        document.getElementById("resultBox").innerText = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById("resultBox").innerText =
          "Erè pandan acha gift card la: " + error.message;
      }
    }

    loadGiftCards();
  </script>
</body>
</html>
