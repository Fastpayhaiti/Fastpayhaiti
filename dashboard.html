<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPay Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#eef2f7;
padding:20px;
}

.container{
max-width:430px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff4d3d;
}

.profile{
width:46px;
height:46px;
border-radius:14px;
background:linear-gradient(135deg,#ff5a3d,#ff7a59);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

.balance-card{
background:linear-gradient(135deg,#ff4d3d,#ff8a5c);
color:white;
border-radius:28px;
padding:24px;
margin-bottom:20px;
box-shadow:0 12px 30px rgba(255,90,61,0.25);
}

.balance-title{
font-size:18px;
}

.balance{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.action-btn{
background:rgba(255,255,255,0.18);
padding:16px;
border-radius:16px;
text-align:center;
font-weight:bold;
color:white;
text-decoration:none;
}

.section{
background:white;
border-radius:20px;
padding:18px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
margin-bottom:16px;
}

.section h2{
margin:0 0 14px 0;
font-size:22px;
}

.item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.item:last-child{
border-bottom:none;
}

.item-title{
font-weight:bold;
font-size:15px;
}

.item-sub{
font-size:13px;
color:#6b7280;
margin-top:3px;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:999px;
font-size:12px;
font-weight:bold;
background:#fff7ed;
color:#c2410c;
margin-top:5px;
}

.back{
display:inline-block;
margin-bottom:16px;
color:#ff4d3d;
font-weight:bold;
text-decoration:none;
}

.empty{
color:#6b7280;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Home</a>

<div class="topbar">
<div class="logo">FastPay</div>
<div class="profile" id="profileLetter">L</div>
</div>

<div class="balance-card">

<div class="balance-title">Wallet Balance</div>
<div class="balance" id="balanceAmount">0 HTG</div>

<div class="actions">

<a href="deposit.html" class="action-btn">Depoze</a>
<a href="withdraw.html" class="action-btn">Retire</a>
<a href="transfer.html" class="action-btn">Transfere</a>
<a href="topup.html" class="action-btn">Top Up</a>

</div>

</div>


<div class="section">
<h2>Tranzaksyon</h2>

<div id="transactionsBox" class="empty">
Pa gen tranzaksyon pou kounye a.
</div>

</div>


<div class="section">
<h2>Order History</h2>

<div id="ordersBox" class="empty">
Pa gen sèvis ou achte pou kounye a.
</div>

</div>

</div>


<script>

const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
const profileLetter = document.getElementById("profileLetter");

if(savedUser && savedUser.fullname){
profileLetter.innerHTML = savedUser.fullname.charAt(0).toUpperCase();
}

const balance = localStorage.getItem("fastpay_balance") || 0;
document.getElementById("balanceAmount").innerHTML = balance + " HTG";


function loadTransactions(){

const transactions = JSON.parse(localStorage.getItem("fastpay_transactions")) || [];
const box = document.getElementById("transactionsBox");

if(transactions.length === 0){
box.innerHTML="Pa gen tranzaksyon pou kounye a.";
return;
}

box.innerHTML="";

transactions.forEach(function(tx){

box.innerHTML +=
'<div class="item">'+
'<div class="item-title">'+tx.service+'</div>'+
'<div class="item-sub">'+tx.amount+'</div>'+
'<div class="item-sub">'+tx.date+'</div>'+
'</div>';

});

}


function loadOrders(){

const socialOrders = JSON.parse(localStorage.getItem("fastpay_social_orders")) || [];
const topups = JSON.parse(localStorage.getItem("fastpay_topups")) || [];
const recharge = JSON.parse(localStorage.getItem("fastpay_recharge_cards")) || [];

const box = document.getElementById("ordersBox");

const all = [...socialOrders,...topups,...recharge];

if(all.length === 0){
box.innerHTML="Pa gen sèvis ou achte pou kounye a.";
return;
}

box.innerHTML="";

all.forEach(function(order){

box.innerHTML +=
'<div class="item">'+
'<div class="item-title">'+(order.service || order.operator || "Service")+'</div>'+
'<div class="item-sub">'+(order.amount || "0")+'</div>'+
'<div class="item-sub">'+(order.date || "")+'</div>'+
'<span class="status">'+(order.status || "Pending")+'</span>'+
'</div>';

});

}

loadTransactions();
loadOrders();

</script>

</body>
</html>
