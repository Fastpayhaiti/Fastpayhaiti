<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FastPay Dashboard</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="page-content">

  <!-- Header -->
  <div class="topbar" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <button class="menu-toggle-btn" style="background:#101826;padding:12px 16px;border-radius:16px;">☰</button>
    <div class="badge" style="width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;">A</div>
  </div>

  <!-- Intro -->
  <div style="margin-bottom:20px;">
    <div class="sub">Hi,</div>
    <h1 style="font-size:56px;line-height:1;margin-bottom:0;">Anelus lucson! 👋</h1>
  </div>

  <!-- Card image zone -->
  <div class="panel" style="text-align:center;">
    <h2>Obtenez votre première carte</h2>
    <div class="sub">Créez votre première carte pour activer votre compte.</div>
    <button style="margin-top:16px;">Commencer</button>
  </div>

  <!-- Balance -->
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="sub">Available balance</div>
      <div class="badge">Active</div>
    </div>
    <div class="balance-box">0 HTG</div>
    <div class="sub">aneluslucson@gmail.com</div>
  </div>

  <!-- Quick info -->
  <div class="panel">
    <h2>Recent Transactions</h2>
    <div class="sub">Pa gen tranzaksyon pou kounya a.</div>
  </div>

  <div class="panel">
    <h2>Recent Notifications</h2>
    <div class="sub">Pa gen notifikasyon pou kounya a.</div>
  </div>

</div>

<div id="nav-root"></div>

<script src="./js/app.js"></script>
<script>
  loadPageNav("home");
</script>

</body>
</html>
