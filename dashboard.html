<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPay Dashboard</title>
<style>
*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:#eef2f7;
padding:20px;
}

.container{
max-width:430px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#ff4d3d;
text-decoration:none;
font-weight:bold;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff5a3d;
}

.profile{
width:44px;
height:44px;
border-radius:14px;
background:linear-gradient(135deg,#ff5a3d,#ff7a59);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

.welcome{
background:white;
padding:18px;
border-radius:18px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
margin-bottom:18px;
}

.welcome h2{
margin:0 0 8px 0;
color:#111827;
}

.welcome p{
margin:0;
color:#6b7280;
}

.balance-card{
background:linear-gradient(135deg,#ff4d3d,#ff8a5c);
color:white;
border-radius:24px;
padding:22px;
box-shadow:0 12px 30px rgba(255,90,61,0.25);
margin-bottom:18px;
}

.balance-title{
font-size:17px;
opacity:0.95;
}

.balance{
font-size:40px;
font-weight:bold;
margin-top:8px;
}

.section{
background:white;
padding:18px;
border-radius:18px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
margin-bottom:18px;
}

.section h3{
margin-top:0;
font-size:22px;
color:#111827;
}

.virtual-card{
background:linear-gradient(135deg,#111,#333);
color:white;
border-radius:18px;
padding:18px;
height:180px;
display:flex;
flex-direction:column;
justify-content:space-between;
position:relative;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.card-chip{
width:42px;
height:30px;
background:gold;
border-radius:6px;
}

.card-number{
font-size:20px;
letter-spacing:2px;
}

.card-name{
font-weight:bold;
font-size:16px;
}

.card-exp{
font-size:14px;
opacity:0.85;
}

.card-logo{
position:absolute;
right:18px;
bottom:18px;
font-weight:bold;
font-size:18px;
opacity:0.85;
}

.tx{
padding:12px 0;
border-bottom:1px solid #eee;
}

.tx:last-child{
border-bottom:none;
}

.tx-name{
font-weight:bold;
color:#111827;
}

.tx-sub{
font-size:13px;
color:#6b7280;
margin-top:4px;
}

.tx-amount{
font-weight:bold;
color:#ff5a3d;
margin-top:4px;
}

.empty{
color:#6b7280;
font-size:15px;
}
</style>
</head>
<body>

<div class="container">

<a href="index.html" class="back">← Back Home</a>

<div class="header">
<div class="logo">FastPay</div>
<div class="profile" id="profileLetter">L</div>
</div>

<div class="welcome">
<h2 id="welcomeName">Byenvini</h2>
<p>Men espas pèsonèl FastPay ou.</p>
</div>

<div class="balance-card">
<div class="balance-title">Solde disponib</div>
<div class="balance" id="userBalance">0 HTG</div>
</div>

<div class="section">
<h3>Virtual Card</h3>
<div class="virtual-card">
<div class="card-chip"></div>
<div class="card-number">**** **** **** 4587</div>
<div class="card-name" id="cardName">LUCKYSTORE</div>
<div class="card-exp">12/29</div>
<div class="card-logo">VISA</div>
</div>
</div>

<div class="section">
<h3>Transaction History</h3>
<div id="txBox" class="empty">Pa gen tranzaksyon pou kounye a.</div>
</div>

</div>

<script>
const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
const transactions = JSON.parse(localStorage.getItem("fastpay_transactions")) || [];

if(savedUser){
  document.getElementById("welcomeName").innerHTML = "Byenvini, " + savedUser.fullname;
  document.getElementById("cardName").innerHTML = savedUser.fullname.toUpperCase();

  const firstLetter = savedUser.fullname.charAt(0).toUpperCase();
  document.getElementById("profileLetter").innerHTML = firstLetter;
}

const userBalance = localStorage.getItem("fastpay_balance");
if(userBalance){
  document.getElementById("userBalance").innerHTML = userBalance + " HTG";
}

const txBox = document.getElementById("txBox");

if(transactions.length > 0){
  txBox.className = "";
  txBox.innerHTML = "";

  transactions.forEach(function(tx){
    txBox.innerHTML +=
      '<div class="tx">' +
      '<div class="tx-name">' + tx.service + '</div>' +
      '<div class="tx-sub">Order ID: ' + (tx.orderId || 'N/A') + '</div>' +
      '<div class="tx-sub">' + tx.date + '</div>' +
      '<div class="tx-amount">' + tx.amount + '</div>' +
      '</div>';
  });
}
</script>

</body>
</html>
