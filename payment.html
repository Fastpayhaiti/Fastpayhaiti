<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment - FastPay</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{background:#05070c;color:#fff;min-height:100vh}
    .app{
      max-width:430px;margin:auto;min-height:100vh;padding:18px 18px 120px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .back-btn,.avatar{
      width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,0.06);color:#fff;text-decoration:none;font-size:18px
    }
    .card{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);border-radius:22px;padding:18px;margin-bottom:18px;
      backdrop-filter:blur(10px)
    }
    .title{font-size:30px;font-weight:800;margin-bottom:10px}
    .sub{color:#8b93a7;font-size:14px;line-height:1.5}
    .field{margin-top:16px}
    .field label{display:block;font-size:14px;color:#c7cfdd;margin-bottom:8px;font-weight:600}
    .input,.file-input{
      width:100%;padding:14px;border-radius:16px;background:#11172a;border:1px solid rgba(255,255,255,0.08);
      color:#fff;outline:none
    }
    .input::placeholder{color:#7f8798}
    .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    .method-card{
      background:#11172a;border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px;cursor:pointer;text-align:center
    }
    .method-card.active{
      background:#2f3cff;border-color:transparent;box-shadow:0 12px 24px rgba(47,60,255,0.30)
    }
    .method-card img{
      width:70px;height:50px;object-fit:contain;margin-bottom:10px;background:#fff;border-radius:10px;padding:6px
    }
    .method-title{font-size:16px;font-weight:800}
    .hint{color:#8b93a7;font-size:13px;line-height:1.5;margin-top:8px}
    .payment-box{
      background:#11172a;border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px;margin-top:14px
    }
    .payment-row{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .payment-row:last-child{border-bottom:none}
    .payment-label{color:#8b93a7;font-size:14px}
    .payment-value{font-size:14px;font-weight:700;text-align:right;word-break:break-word}
    .qr-wrap{text-align:center;margin-top:14px}
    .qr-wrap img{
      width:180px;height:180px;object-fit:contain;background:#fff;border-radius:16px;padding:10px
    }
    .preview{
      margin-top:12px;text-align:center
    }
    .preview img{
      width:100%;max-height:220px;object-fit:contain;border-radius:16px;border:1px solid rgba(255,255,255,0.08)
    }
    .primary-btn,.secondary-btn{
      display:block;width:100%;border:none;border-radius:18px;font-size:17px;font-weight:700;padding:17px;
      cursor:pointer;text-align:center;margin-top:12px
    }
    .primary-btn{background:#2f3cff;color:#fff;box-shadow:0 14px 30px rgba(47,60,255,0.35)}
    .primary-btn:disabled{opacity:.6;cursor:not-allowed}
    .secondary-btn{background:#11172a;color:#fff;border:1px solid rgba(255,255,255,0.08)}
    .result-box{white-space:pre-wrap;word-break:break-word;font-size:13px;color:#dbe4ff;line-height:1.5}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="wallet.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="avatar" id="avatar">A</div>
  </div>

  <div class="card">
    <div class="title">Payment</div>
    <div class="sub">Chwazi metòd peman an, peye, epi voye prèv peman an pou admin valide li.</div>
  </div>

  <div class="card">
    <div class="field">
      <label>User ID</label>
      <input id="userId" class="input" type="number" value="1">
    </div>

    <div class="field">
      <label>Non kliyan</label>
      <input id="fullname" class="input" type="text" placeholder="Eg: Jean Pierre">
    </div>

    <div class="field">
      <label>Montan</label>
      <input id="amount" class="input" type="number" placeholder="Eg: 500">
    </div>

    <div class="field">
      <label>Referans tranzaksyon</label>
      <input id="reference" class="input" type="text" placeholder="Eg: MC-458899 / PP-7890 / NC-555">
    </div>

    <div class="field">
      <label>Chwazi metòd peman</label>
      <div class="method-grid">
        <div class="method-card" onclick="selectMethod(this,'moncash')">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/MonCash_logo.png" alt="MonCash">
          <div class="method-title">MonCash</div>
        </div>

        <div class="method-card" onclick="selectMethod(this,'natcash')">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Natcash_logo.png/320px-Natcash_logo.png" alt="NatCash">
          <div class="method-title">NatCash</div>
        </div>

        <div class="method-card" onclick="selectMethod(this,'paypal')">
          <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
          <div class="method-title">PayPal</div>
        </div>
      </div>
    </div>

    <div class="payment-box" id="paymentInfoBox" style="display:none;">
      <div class="payment-row">
        <div class="payment-label">Metòd</div>
        <div class="payment-value" id="infoMethod">--</div>
      </div>
      <div class="payment-row">
        <div class="payment-label">Kont / Nimewo</div>
        <div class="payment-value" id="infoAccount">--</div>
      </div>
      <div class="payment-row">
        <div class="payment-label">Benefisyè</div>
        <div class="payment-value" id="infoName">--</div>
      </div>

      <div class="qr-wrap">
        <img id="qrImage" src="" alt="QR Code" style="display:none;">
      </div>

      <div class="hint">Apre ou fin peye, mete referans lan epi chwazi screenshot oswa foto prèv peman an.</div>
    </div>

    <div class="field">
      <label>Prèv peman (image)</label>
      <input id="proof" class="file-input" type="file" accept="image/*" onchange="previewProof(event)">
      <div class="preview" id="previewBox"></div>
    </div>

    <button class="primary-btn" id="submitBtn" onclick="submitPayment()">Mwen fin peye</button>
    <button class="secondary-btn" onclick="window.location.href='wallet.html'">Retounen Wallet</button>
  </div>

  <div class="card result-box" id="resultBox">Rezilta ap parèt isit...</div>
</div>

<script>
  const API_BASE = "https://fastpayhaiti.onrender.com";
  const savedUser = JSON.parse(localStorage.getItem("fastpay_user") || "{}");

  // Ranplase valè sa yo ak vrè enfòmasyon pa ou
  const PAYMENT_CONFIG = {
    moncash: {
      label: "MonCash",
      account: "+509 0000-0000",
      beneficiary: "FastPay / Luckystore",
      qr: "https://via.placeholder.com/300x300.png?text=MonCash+QR"
    },
    natcash: {
      label: "NatCash",
      account: "+509 0000-0000",
      beneficiary: "FastPay / Luckystore",
      qr: "https://via.placeholder.com/300x300.png?text=NatCash+QR"
    },
    paypal: {
      label: "PayPal",
      account: "paypal@email.com",
      beneficiary: "FastPay / Luckystore",
      qr: "https://via.placeholder.com/300x300.png?text=PayPal+QR"
    }
  };

  let selectedMethod = null;

  if(savedUser.fullname){
    document.getElementById("avatar").innerText = savedUser.fullname[0].toUpperCase();
    document.getElementById("fullname").value = savedUser.fullname;
    if(savedUser.id){
      document.getElementById("userId").value = savedUser.id;
    }
  }

  function selectMethod(el, method){
    document.querySelectorAll(".method-card").forEach(card => card.classList.remove("active"));
    el.classList.add("active");
    selectedMethod = method;

    const cfg = PAYMENT_CONFIG[method];
    document.getElementById("paymentInfoBox").style.display = "block";
    document.getElementById("infoMethod").innerText = cfg.label;
    document.getElementById("infoAccount").innerText = cfg.account;
    document.getElementById("infoName").innerText = cfg.beneficiary;
    document.getElementById("qrImage").src = cfg.qr;
    document.getElementById("qrImage").style.display = "inline-block";
  }

  function previewProof(event){
    const file = event.target.files[0];
    const box = document.getElementById("previewBox");
    box.innerHTML = "";

    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e){
      box.innerHTML = `<img src="${e.target.result}" alt="Proof Preview">`;
    };
    reader.readAsDataURL(file);
  }

  async function submitPayment(){
    const userId = document.getElementById("userId").value.trim();
    const fullname = document.getElementById("fullname").value.trim();
    const amount = document.getElementById("amount").value.trim();
    const reference = document.getElementById("reference").value.trim();
    const proofFile = document.getElementById("proof").files[0];
    const submitBtn = document.getElementById("submitBtn");

    if(!selectedMethod){
      alert("Tanpri chwazi yon metòd peman.");
      return;
    }

    if(!userId || !fullname || !amount || !reference){
      alert("Tanpri ranpli tout chan yo.");
      return;
    }

    if(!proofFile){
      alert("Tanpri mete prèv peman an.");
      return;
    }

    try{
      submitBtn.disabled = true;
      submitBtn.innerText = "Ap voye...";

      document.getElementById("resultBox").innerText = "Ap voye demann peman an...";

      const formData = new FormData();
      formData.append("userId", userId);
      formData.append("fullname", fullname);
      formData.append("method", selectedMethod);
      formData.append("amount", amount);
      formData.append("reference", reference);
      formData.append("proof", proofFile);

      const res = await fetch(`${API_BASE}/api/payment-request`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      document.getElementById("resultBox").innerText = JSON.stringify(data, null, 2);

      if(res.ok && data.success){
        submitBtn.innerText = "Voye ak siksè";
      } else {
        submitBtn.disabled = false;
        submitBtn.innerText = "Mwen fin peye";
      }
    } catch(error){
      document.getElementById("resultBox").innerText = "Erè pandan voye prèv la:\n\n" + error.message;
      submitBtn.disabled = false;
      submitBtn.innerText = "Mwen fin peye";
    }
  }
</script>
</body>
  </html>
