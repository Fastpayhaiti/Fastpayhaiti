<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FastPay Wallet</title>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;background:#0b1020;color:#fff;padding:20px}
    .container{max-width:550px;margin:auto}
    .card{
      background:#11182d;
      border-radius:18px;
      padding:20px;
      margin-bottom:18px;
      border:1px solid rgba(255,255,255,.08)
    }
    h1{margin-bottom:10px;text-align:center}
    p.sub{color:#aab3c5;text-align:center;margin-bottom:18px}
    label{display:block;margin:12px 0 6px}
    input,select,button{
      width:100%;padding:14px;border:none;border-radius:12px;font-size:16px
    }
    input,select{background:#1a2340;color:white}
    button{background:#4f6bff;color:#fff;font-weight:bold;margin-top:14px}
    .result{
      background:#0f1530;
      padding:14px;
      border-radius:12px;
      white-space:pre-wrap;
      word-break:break-word;
      font-size:14px;
      color:#dce6ff
    }
    .balance{
      font-size:32px;
      font-weight:bold;
      margin-top:8px
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>FastPay Wallet</h1>
      <p class="sub">Wallet + Topup + Deduction + Benefis</p>

      <label>User ID</label>
      <input id="userId" value="1" />

      <button onclick="loadWallet()">Chaje Wallet</button>

      <div class="balance" id="balanceBox">$0.00</div>
      <div id="userInfo"></div>
    </div>

    <div class="card">
      <label>Ajoute lajan nan wallet</label>
      <input id="addAmount" type="number" placeholder="Eg: 20" />
      <button onclick="addMoney()">Ajoute Lajan</button>
    </div>

    <div class="card">
      <label>Peyi</label>
      <select id="countryCode">
        <option value="HT">Haiti</option>
        <option value="US">USA</option>
        <option value="DO">Dominican Republic</option>
      </select>

      <label>Operatè</label>
      <select id="operatorId"></select>

      <label>Montan</label>
      <input id="amount" type="number" placeholder="Eg: 5" />

      <label>Nimewo telefòn</label>
      <input id="phone" placeholder="Eg: 36363927" />

      <button onclick="loadOperators()">Chaje Operatè</button>
      <button onclick="sendTopup()">Fè Topup + Deduction</button>
    </div>

    <div class="card">
      <div class="result" id="resultBox">Rezilta ap parèt isit...</div>
    </div>
  </div>

  <script>
    const API = "https://fastpayhaiti.onrender.com";

    async function loadWallet() {
      const userId = document.getElementById("userId").value;
      const res = await fetch(`${API}/api/wallet/${userId}`);
      const data = await res.json();

      if (data.error) {
        document.getElementById("resultBox").innerText = JSON.stringify(data, null, 2);
        return;
      }

      document.getElementById("balanceBox").innerText = `$${Number(data.balance).toFixed(2)}`;
      document.getElementById("userInfo").innerText = `${data.name} | ${data.email}`;
      document.getElementById("resultBox").innerText = JSON.stringify(data, null, 2);
    }

    async function addMoney() {
      const userId = document.getElementById("userId").value;
      const amount = document.getElementById("addAmount").value;

      const res = await fetch(`${API}/api/wallet/add`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ userId, amount })
      });

      const data = await res.json();
      document.getElementById("resultBox").innerText = JSON.stringify(data, null, 2);
      loadWallet();
    }

    async function loadOperators() {
      const countryCode = document.getElementById("countryCode").value;
      const res = await fetch(`${API}/api/reloadly/operators/${countryCode}`);
      const data = await res.json();

      const select = document.getElementById("operatorId");
      select.innerHTML = "";

      if (!Array.isArray(data)) {
        document.getElementById("resultBox").innerText = JSON.stringify(data, null, 2);
        return;
      }

      data.forEach(op => {
        const option = document.createElement("option");
        option.value = op.operatorId || op.id;
        option.textContent = op.name;
        select.appendChild(option);
      });

      document.getElementById("resultBox").innerText = "Operatè yo chaje ✅";
    }

    async function sendTopup() {
      const body = {
        userId: document.getElementById("userId").value,
        operatorId: document.getElementById("operatorId").value,
        amount: document.getElementById("amount").value,
        phone: document.getElementById("phone").value,
        countryCode: document.getElementById("countryCode").value,
        useLocalAmount: false
      };

      const res = await fetch(`${API}/api/topup`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(body)
      });

      const data = await res.json();
      document.getElementById("resultBox").innerText = JSON.stringify(data, null, 2);
      loadWallet();
    }

    loadWallet();
    loadOperators();
  </script>
</body>
</html>
