<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPay Premium Wallet</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      background:#05070c;
      color:#ffffff;
      min-height:100vh;
    }

    .app{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      padding:18px 18px 110px;
      position:relative;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .left-top{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      color:#ffffff;
      font-size:22px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      backdrop-filter:blur(10px);
    }

    .page-title{
      font-size:24px;
      font-weight:800;
    }

    .profile-avatar{
      width:48px;
      height:48px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      color:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:700;
    }

    .wallet-main-card{
      background:linear-gradient(135deg,#0d1117,#1c2330);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:22px;
      margin-bottom:22px;
      box-shadow:0 22px 45px rgba(0,0,0,0.35);
      overflow:hidden;
      position:relative;
    }

    .wallet-main-card::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(59,130,246,0.10);
      top:-40px;
      right:-40px;
    }

    .wallet-top{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }

    .wallet-label{
      color:#9ca3af;
      font-size:14px;
      margin-bottom:6px;
    }

    .wallet-balance{
      font-size:40px;
      font-weight:800;
      line-height:1.1;
    }

    .wallet-sub{
      margin-top:10px;
      color:#8b93a7;
      font-size:14px;
      word-break:break-word;
      position:relative;
      z-index:2;
    }

    .wallet-badge{
      padding:8px 14px;
      border-radius:999px;
      background:rgba(59,130,246,0.14);
      color:#93c5fd;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .mini-stats{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      position:relative;
      z-index:2;
    }

    .mini-box{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:18px;
      padding:14px;
    }

    .mini-label{
      color:#8b93a7;
      font-size:12px;
      margin-bottom:6px;
    }

    .mini-value{
      font-size:20px;
      font-weight:800;
    }

    .section{
      margin-bottom:24px;
    }

    .section-title{
      font-size:22px;
      font-weight:800;
      margin-bottom:14px;
    }

    .quick-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .quick-card{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:18px 16px;
      text-decoration:none;
      color:#ffffff;
      min-height:100px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:12px;
    }

    .quick-card i{
      font-size:22px;
      color:#c9d1ff;
    }

    .quick-card span{
      font-size:17px;
      font-weight:700;
    }

    .list-box{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:10px 16px;
    }

    .list-item{
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .list-item:last-child{
      border-bottom:none;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .item-title{
      font-size:15px;
      font-weight:700;
      margin-bottom:5px;
    }

    .item-sub{
      color:#8b93a7;
      font-size:13px;
      line-height:1.45;
    }

    .item-amount{
      font-size:15px;
      font-weight:700;
      white-space:nowrap;
    }

    .empty{
      color:#8b93a7;
      font-size:14px;
      padding:10px 0;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      width:100%;
      max-width:430px;
      background:#04060a;
      border-top:1px solid rgba(255,255,255,0.08);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      padding:12px 8px 14px;
      z-index:1000;
    }

    .nav-item{
      text-decoration:none;
      color:#8b93a7;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:600;
    }

    .nav-item i{
      font-size:23px;
    }

    .nav-item.active{
      color:#3b4cff;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="left-top">
      <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="page-title">Wallet</div>
    </div>
    <div class="profile-avatar" id="profileLetter">A</div>
  </div>

  <div class="wallet-main-card">
    <div class="wallet-top">
      <div>
        <div class="wallet-label">Available Balance</div>
        <div class="wallet-balance" id="walletBalance">0 HTG</div>
      </div>
      <div class="wallet-badge">Digital Wallet</div>
    </div>

    <div class="wallet-sub" id="walletSub">FastPay Wallet</div>

    <div class="mini-stats">
      <div class="mini-box">
        <div class="mini-label">Transactions</div>
        <div class="mini-value" id="totalTransactions">0</div>
      </div>

      <div class="mini-box">
        <div class="mini-label">Notifications</div>
        <div class="mini-value" id="totalNotifications">0</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Quick Actions</div>
    <div class="quick-grid">
      <a href="deposit.html" class="quick-card">
        <i class="fa-solid fa-wallet"></i>
        <span>Deposit</span>
      </a>

      <a href="withdraw.html" class="quick-card">
        <i class="fa-solid fa-download"></i>
        <span>Withdraw</span>
      </a>

      <a href="transfer.html" class="quick-card">
        <i class="fa-regular fa-paper-plane"></i>
        <span>Send</span>
      </a>

      <a href="statement.html" class="quick-card">
        <i class="fa-regular fa-file-lines"></i>
        <span>Statement</span>
      </a>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent Transactions</div>
    <div class="list-box" id="transactionsBox">
      <div class="empty">Pa gen tranzaksyon pou kounye a.</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent Notifications</div>
    <div class="list-box" id="notificationsBox">
      <div class="empty">Pa gen notifikasyon pou kounye a.</div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="statement.html" class="nav-item">
    <i class="fa-solid fa-arrow-rotate-left"></i>
    <span>Transactions</span>
  </a>

  <a href="giftcard.html" class="nav-item">
    <i class="fa-brands fa-bitcoin"></i>
    <span>Services</span>
  </a>

  <a href="card-dashboard.html" class="nav-item">
    <i class="fa-regular fa-credit-card"></i>
    <span>Cards</span>
  </a>

  <a href="wallet.html" class="nav-item active">
    <i class="fa-solid fa-wallet"></i>
    <span>Wallet</span>
  </a>
</div>

<script src="app.js"></script>
<script>
  const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
  const profileLetter = document.getElementById("profileLetter");
  const walletBalance = document.getElementById("walletBalance");
  const walletSub = document.getElementById("walletSub");
  const totalTransactions = document.getElementById("totalTransactions");
  const totalNotifications = document.getElementById("totalNotifications");

  if(savedUser && savedUser.fullname){
    profileLetter.innerText = savedUser.fullname.charAt(0).toUpperCase();
    walletBalance.innerText = (savedUser.balance || 0) + " HTG";
    walletSub.innerText = savedUser.email || "FastPay Wallet";
  }

  if(window.FastPayV2 && savedUser && savedUser.id){
    const userTransactions = FastPayV2.getUserTransactions(savedUser.id) || [];
    const userNotifications = FastPayV2.getUserNotifications(savedUser.id) || [];

    totalTransactions.innerText = userTransactions.length;
    totalNotifications.innerText = userNotifications.length;

    const txBox = document.getElementById("transactionsBox");
    if(userTransactions.length > 0){
      txBox.innerHTML = "";
      userTransactions.slice(0,5).forEach(function(tx){
        txBox.innerHTML += `
          <div class="list-item">
            <div class="item-top">
              <div>
                <div class="item-title">${tx.service || "Transaction"}</div>
                <div class="item-sub">${tx.date || ""}</div>
              </div>
              <div class="item-amount">${tx.amount || "0"}</div>
            </div>
          </div>
        `;
      });
    }

    const noteBox = document.getElementById("notificationsBox");
    if(userNotifications.length > 0){
      noteBox.innerHTML = "";
      userNotifications.slice(0,5).forEach(function(note){
        noteBox.innerHTML += `
          <div class="list-item">
            <div class="item-title">${note.title || "Nouvo alèt"}</div>
            <div class="item-sub">${note.text || ""}</div>
          </div>
        `;
      });
    }
  }
</script>

</body>
    </html>
