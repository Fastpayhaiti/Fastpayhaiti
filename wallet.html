<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wallet - FastPay</title>
  <link rel="stylesheet" href="/Fastpayhaiti/css/style.css">
</head>
<body>
  <div class="page-content">
    <div class="header-card">
      <h1>Wallet</h1>
      <div class="sub">Gade balans ou epi ajoute lajan.</div>
    </div>

    <div class="panel">
      <label>User ID</label>
      <input id="userId" value="1">
      <button onclick="loadWallet()">Chaje Wallet</button>
      <div id="balance" class="balance-box">$0.00</div>
      <div id="userInfo" class="sub"></div>
    </div>

    <div class="panel">
      <label>Ajoute lajan</label>
      <input id="amount" placeholder="Eg: 20">
      <button onclick="addMoney()">Ajoute Lajan</button>
    </div>

    <div class="panel">
      <div id="result" class="result">Rezilta ap parèt isit...</div>
    </div>
  </div>

  <div id="nav-root"></div>

  <script src="/Fastpayhaiti/js/app.js"></script>
  <script>
    loadPageNav("wallet");

    async function loadWallet() {
      const id = document.getElementById("userId").value;
      const res = await fetch("https://fastpayhaiti.onrender.com/api/wallet/" + id);
      const data = await res.json();

      document.getElementById("balance").innerText =
        "$" + Number(data.balance || 0).toFixed(2);

      document.getElementById("userInfo").innerText =
        `${data.name || ""} | ${data.email || ""}`;

      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
    }

    async function addMoney() {
      const id = document.getElementById("userId").value;
      const amount = document.getElementById("amount").value;

      const res = await fetch("https://fastpayhaiti.onrender.com/api/deposit", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ userId: id, amount })
      });

      const data = await res.json();
      document.getElementById("result").innerText = JSON.stringify(data, null, 2);
      loadWallet();
    }

    loadWallet();
  </script>
</body>
</html>
