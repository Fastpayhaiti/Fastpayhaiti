<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wallet - FastPay</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- MENU -->
  <div id="menu-root"></div>

  <div class="page-content">

    <div class="header-card">
      <h1>FastPay Wallet</h1>
      <div class="sub">Gade balans ou epi jere lajan ou.</div>
    </div>

    <!-- WALLET BALANCE -->
    <div class="panel">
      <label>User ID</label>
      <input id="userId" value="1" />

      <button onclick="loadWallet()">Chaje Wallet</button>

      <div id="balanceBox" class="balance-box">$0.00</div>
      <div id="userInfo" class="sub"></div>
    </div>

    <!-- ADD MONEY -->
    <div class="panel">
      <label>Ajoute lajan</label>
      <input id="amount" placeholder="Eg: 20" />

      <button onclick="addMoney()">Ajoute Lajan</button>
    </div>

    <!-- RESULT -->
    <div class="panel">
      <div id="result" class="result">Rezilta ap parèt isit...</div>
    </div>

  </div>

  <!-- NAVIGATION -->
  <div id="nav-root"></div>

  <!-- JS -->
  <script src="js/app.js"></script>

  <script>
    injectLayout("wallet");

    async function loadWallet() {
      const userId = document.getElementById("userId").value;

      const res = await fetch(`https://fastpayhaiti.onrender.com/api/wallet/${userId}`);
      const data = await res.json();

      document.getElementById("balanceBox").textContent =
        `$${Number(data.balance || 0).toFixed(2)}`;

      document.getElementById("userInfo").textContent =
        `${data.name || ""} | ${data.email || ""}`;

      document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);
    }

    async function addMoney() {
      const userId = document.getElementById("userId").value;
      const amount = document.getElementById("amount").value;

      const res = await fetch(`https://fastpayhaiti.onrender.com/api/deposit`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, amount })
      });

      const data = await res.json();

      document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);

      loadWallet();
    }

    loadWallet();
  </script>

</body>
</html>
