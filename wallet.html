<!DOCTYPE html>
<html>
<head>
<title>Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial,sans-serif;
background:#eef2f7;
padding:20px;
margin:0;
}

.container{
max-width:420px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#ff4d3d;
text-decoration:none;
font-weight:bold;
}

.balance-card{
background:linear-gradient(135deg,#ff4d3d,#ff8a5c);
color:white;
padding:25px;
border-radius:22px;
box-shadow:0 10px 25px rgba(255,90,61,0.25);
margin-bottom:20px;
}

.balance-title{
font-size:18px;
opacity:0.95;
}

.balance{
font-size:42px;
font-weight:bold;
margin-top:10px;
}

.actions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

a{
text-decoration:none;
}

.action-btn{
background:white;
border:none;
padding:14px;
border-radius:14px;
font-size:16px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
color:#111;
text-align:center;
display:block;
}

.history{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.history h2{
margin-top:0;
font-size:24px;
}

.tx{
padding:12px 0;
border-bottom:1px solid #eee;
}

.tx:last-child{
border-bottom:none;
}

.tx small{
color:#777;
}
</style>
</head>
<body>

<div class="container">
<a href="index.html" class="back">← Back Home</a>

<div class="balance-card">
  <div class="balance-title">Solde disponib</div>
  <div class="balance">0 HTG</div>
</div>

<div class="actions">
  <a href="order.html" class="action-btn">Depoze</a>
  <a href="order.html" class="action-btn">Retire</a>
  <a href="order.html" class="action-btn">Transfere</a>
  <a href="order.html" class="action-btn">Demande</a>
</div>

<div class="history">
  <h2>Dènye tranzaksyon</h2>

  <div class="tx">
    <strong>Depo MonCash</strong><br>
    <small>+0 HTG</small>
  </div>

  <div class="tx">
    <strong>Transfè kliyan</strong><br>
    <small>-0 HTG</small>
  </div>

  <div class="tx">
    <strong>Retrè wallet</strong><br>
    <small>-0 HTG</small>
  </div>
</div>
</div>

</body>
</html>
