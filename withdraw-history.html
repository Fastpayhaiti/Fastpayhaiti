<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPay Withdraw History v2</title>
<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  background:#eef2f7;
  padding:20px;
  color:#111827;
}

.container{
  max-width:430px;
  margin:auto;
}

.back{
  display:inline-block;
  margin-bottom:16px;
  color:#ff4d3d;
  text-decoration:none;
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.logo{
  font-size:30px;
  font-weight:bold;
  color:#ff5a3d;
}

.profile{
  width:46px;
  height:46px;
  border-radius:14px;
  background:linear-gradient(135deg,#ff5a3d,#ff7a59);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 6px 16px rgba(255,90,61,0.25);
}

.hero{
  background:linear-gradient(135deg,#111827,#374151);
  color:white;
  border-radius:26px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(17,24,39,0.22);
}

.hero h1{
  margin:0 0 10px 0;
  font-size:28px;
  line-height:1.2;
}

.hero p{
  margin:0;
  font-size:15px;
  line-height:1.6;
  opacity:0.98;
}

.section{
  background:white;
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 18px rgba(0,0,0,0.06);
  margin-bottom:18px;
}

.section h2{
  margin:0 0 14px 0;
  font-size:22px;
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.stat-box{
  background:#f8fafc;
  border-radius:16px;
  padding:14px;
}

.stat-title{
  color:#6b7280;
  font-size:13px;
  margin-bottom:6px;
}

.stat-value{
  font-size:20px;
  font-weight:bold;
  color:#111827;
}

.item{
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.item:last-child{
  border-bottom:none;
}

.item-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.item-title{
  font-weight:bold;
  font-size:15px;
}

.item-amount{
  font-weight:bold;
  font-size:15px;
  text-align:right;
  color:#dc2626;
}

.item-date{
  color:#6b7280;
  font-size:13px;
  margin-top:4px;
}

.item-sub{
  color:#4b5563;
  font-size:14px;
  margin-top:6px;
  line-height:1.5;
}

.badge{
  display:inline-block;
  margin-top:8px;
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;
  font-weight:bold;
}

.badge-success{
  background:#ecfdf3;
  color:#166534;
}

.badge-warning{
  background:#fff7ed;
  color:#c2410c;
}

.badge-danger{
  background:#fee2e2;
  color:#991b1b;
}

.main-btn{
  display:block;
  width:100%;
  text-align:center;
  padding:15px;
  border:none;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
  margin-top:12px;
  cursor:pointer;
}

.orange-btn{
  background:#ff4d3d;
  color:white;
}

.dark-btn{
  background:#111827;
  color:white;
}

.empty{
  color:#6b7280;
  font-size:14px;
}

.notice{
  display:none;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  line-height:1.5;
  margin-bottom:14px;
}

.notice.error{
  background:#fee2e2;
  color:#991b1b;
}
</style>
</head>
<body>

<div class="container">

<a href="wallet.html" class="back">← Back Wallet</a>

<div class="topbar">
  <div class="logo">FastPay</div>
  <div class="profile" id="profileLetter">U</div>
</div>

<div id="noticeBox" class="notice error"></div>

<div class="hero">
  <h1>Withdraw History</h1>
  <p>Wè tout demann retrè ou yo, estati yo, ak detay ki gen rapò ak retrè yo.</p>
</div>

<div class="section">
  <h2>Rezime Retrè</h2>

  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-title">Total Withdraws</div>
      <div class="stat-value" id="totalWithdraws">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Approved</div>
      <div class="stat-value" id="approvedWithdraws">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Pending</div>
      <div class="stat-value" id="pendingWithdraws">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Total Amount</div>
      <div class="stat-value" id="totalAmount">0 HTG</div>
    </div>
  </div>
</div>

<div class="section">
  <h2>Tout demann retrè yo</h2>
  <div id="withdrawList" class="empty">Pa gen retrè pou kounye a.</div>

  <a href="withdraw.html" class="main-btn orange-btn">Nouvo Withdraw</a>
  <a href="dashboard.html" class="main-btn dark-btn">Retounen sou Dashboard</a>
</div>

</div>

<script src="app.js"></script>
<script>
function showError(message){
  const box = document.getElementById("noticeBox");
  box.style.display = "block";
  box.innerHTML = message;
}

function getStatusBadge(status){
  const s = String(status || "").toLowerCase();
  if(s.includes("approved")) return "badge-success";
  if(s.includes("rejected")) return "badge-danger";
  return "badge-warning";
}

const currentUser = FastPayV2.getCurrentUser();

if(!currentUser){
  showError("Ou pa konekte. Tanpri login anvan.");
  setTimeout(() => {
    window.location.href = "login.html";
  }, 1200);
} else {
  document.getElementById("profileLetter").innerHTML =
    currentUser.fullname.charAt(0).toUpperCase();

  const allWithdraws = FastPayDB.get("fastpay_withdraws", []);
  const userWithdraws = allWithdraws.filter(item => item.userId === currentUser.id);

  document.getElementById("totalWithdraws").innerHTML = userWithdraws.length;
  document.getElementById("approvedWithdraws").innerHTML =
    userWithdraws.filter(item => String(item.status || "").toLowerCase().includes("approved")).length;
  document.getElementById("pendingWithdraws").innerHTML =
    userWithdraws.filter(item => String(item.status || "").toLowerCase().includes("pending")).length;

  let totalAmount = 0;
  userWithdraws.forEach(item => {
    totalAmount += parseInt(item.amountValue || 0);
  });
  document.getElementById("totalAmount").innerHTML = totalAmount + " HTG";

  const list = document.getElementById("withdrawList");

  if(userWithdraws.length === 0){
    list.innerHTML = "Pa gen retrè pou kounye a.";
  } else {
    list.className = "";
    list.innerHTML = "";

    userWithdraws.forEach(function(item){
      list.innerHTML += `
        <div class="item">
          <div class="item-top">
            <div>
              <div class="item-title">${item.method || "Withdraw"} - ${item.bank || "N/A"}</div>
              <div class="item-date">${item.date || ""}</div>
            </div>
            <div class="item-amount">${item.amount || "0 HTG"}</div>
          </div>

          <div class="item-sub"><strong>Account Name:</strong> ${item.accountName || "N/A"}</div>
          <div class="item-sub"><strong>Account Number:</strong> ${item.accountNumber || "N/A"}</div>
          <div class="item-sub"><strong>Account Type:</strong> ${item.accountType || "N/A"}</div>
          <div class="item-sub"><strong>Currency:</strong> ${item.currency || "HTG"}</div>
          <div class="item-sub"><strong>Details:</strong> ${item.details || "N/A"}</div>
          <div class="badge ${getStatusBadge(item.status)}">${item.status || "Pending Verification"}</div>
        </div>
      `;
    });
  }
}
</script>

</body>
</html>
