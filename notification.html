<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPay Notifications v2</title>
<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  background:#eef2f7;
  padding:20px;
  color:#111827;
}

.container{
  max-width:430px;
  margin:auto;
}

.back{
  display:inline-block;
  margin-bottom:16px;
  color:#ff4d3d;
  text-decoration:none;
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.logo{
  font-size:30px;
  font-weight:bold;
  color:#ff5a3d;
}

.profile{
  width:46px;
  height:46px;
  border-radius:14px;
  background:linear-gradient(135deg,#ff5a3d,#ff7a59);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 6px 16px rgba(255,90,61,0.25);
}

.hero{
  background:linear-gradient(135deg,#111827,#374151);
  color:white;
  border-radius:26px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(17,24,39,0.22);
}

.hero h1{
  margin:0 0 10px 0;
  font-size:28px;
  line-height:1.2;
}

.hero p{
  margin:0;
  font-size:15px;
  line-height:1.6;
  opacity:0.98;
}

.section{
  background:white;
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 18px rgba(0,0,0,0.06);
  margin-bottom:18px;
}

.section h2{
  margin:0 0 14px 0;
  font-size:22px;
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.stat-box{
  background:#f8fafc;
  border-radius:16px;
  padding:14px;
}

.stat-title{
  color:#6b7280;
  font-size:13px;
  margin-bottom:6px;
}

.stat-value{
  font-size:20px;
  font-weight:bold;
  color:#111827;
}

.notice{
  padding:14px 0;
  border-bottom:1px solid #eee;
}

.notice:last-child{
  border-bottom:none;
}

.notice-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.notice-title{
  font-weight:bold;
  font-size:15px;
}

.notice-date{
  color:#6b7280;
  font-size:13px;
  margin-top:4px;
}

.notice-text{
  color:#4b5563;
  font-size:14px;
  margin-top:6px;
  line-height:1.5;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:24px;
  height:24px;
  padding:0 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.badge-info{
  background:#eff6ff;
  color:#1d4ed8;
}

.badge-success{
  background:#ecfdf3;
  color:#166534;
}

.badge-warning{
  background:#fff7ed;
  color:#c2410c;
}

.read-state{
  display:inline-block;
  margin-top:8px;
  font-size:12px;
  font-weight:bold;
  padding:5px 10px;
  border-radius:999px;
}

.read-yes{
  background:#f3f4f6;
  color:#374151;
}

.read-no{
  background:#fee2e2;
  color:#991b1b;
}

.main-btn{
  display:block;
  width:100%;
  text-align:center;
  padding:15px;
  border:none;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
  margin-top:12px;
  cursor:pointer;
}

.orange-btn{
  background:#ff4d3d;
  color:white;
}

.dark-btn{
  background:#111827;
  color:white;
}

.empty{
  color:#6b7280;
  font-size:14px;
}

.notice-box{
  display:none;
  padding:14px;
  border-radius:14px;
  font-weight:bold;
  line-height:1.5;
  margin-bottom:14px;
}

.notice-error{
  background:#fee2e2;
  color:#991b1b;
}

.notice-success{
  background:#ecfdf3;
  color:#166534;
}
</style>
</head>
<body>

<div class="container">

<a href="dashboard.html" class="back">← Back Dashboard</a>

<div class="topbar">
  <div class="logo">FastPay</div>
  <div class="profile" id="profileLetter">U</div>
</div>

<div id="pageNotice" class="notice-box"></div>

<div class="hero">
  <h1>Notifications</h1>
  <p>Wè tout alèt, mizajou, ak aktivite ki gen rapò ak kont FastPay ou a.</p>
</div>

<div class="section">
  <h2>Rezime</h2>

  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-title">Total Notifications</div>
      <div class="stat-value" id="totalNotifications">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Unread</div>
      <div class="stat-value" id="unreadNotifications">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Latest Title</div>
      <div class="stat-value" id="latestTitle">Pa gen</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">User</div>
      <div class="stat-value" id="userNameMini">FastPay</div>
    </div>
  </div>

  <button class="main-btn orange-btn" onclick="markAllReadNow()">Make All Read</button>
</div>

<div class="section">
  <h2>Tout notifications yo</h2>
  <div id="notificationsList" class="empty">Pa gen notifikasyon pou kounye a.</div>

  <a href="wallet.html" class="main-btn dark-btn">Ale sou Wallet</a>
  <a href="statement.html" class="main-btn dark-btn">Ale sou Statement</a>
</div>

</div>

<script src="app.js"></script>
<script>
function showPageNotice(message, type){
  const box = document.getElementById("pageNotice");
  box.style.display = "block";
  box.className = "notice-box " + (type === "success" ? "notice-success" : "notice-error");
  box.innerHTML = message;
}

function getTypeBadgeClass(type){
  if(type === "success") return "badge-success";
  if(type === "warning") return "badge-warning";
  return "badge-info";
}

const currentUser = FastPayV2.getCurrentUser();

if(!currentUser){
  showPageNotice("Ou pa konekte. Tanpri login anvan.", "error");
  setTimeout(() => {
    window.location.href = "login.html";
  }, 1200);
} else {
  document.getElementById("profileLetter").innerHTML = currentUser.fullname.charAt(0).toUpperCase();
  document.getElementById("userNameMini").innerHTML = currentUser.fullname;

  const notifications = FastPayV2.getUserNotifications(currentUser.id);
  const unreadCount = FastPayV2.getUnreadCount(currentUser.id);

  document.getElementById("totalNotifications").innerHTML = notifications.length;
  document.getElementById("unreadNotifications").innerHTML = unreadCount;

  if(notifications.length > 0){
    document.getElementById("latestTitle").innerHTML = notifications[0].title || "Wi";
  }

  const list = document.getElementById("notificationsList");

  if(notifications.length === 0){
    list.innerHTML = "Pa gen notifikasyon pou kounye a.";
  } else {
    list.className = "";
    list.innerHTML = "";

    notifications.forEach(function(note){
      list.innerHTML += `
        <div class="notice">
          <div class="notice-top">
            <div>
              <div class="notice-title">${note.title || 'Nouvo alèt'}</div>
              <div class="notice-date">${note.date || ''}</div>
            </div>
            <div class="badge ${getTypeBadgeClass(note.type)}">${note.type || 'info'}</div>
          </div>

          <div class="notice-text">${note.text || ''}</div>

          <div class="read-state ${note.read ? 'read-yes' : 'read-no'}">
            ${note.read ? 'Li deja' : 'Poko li'}
          </div>
        </div>
      `;
    });
  }
}

function markAllReadNow(){
  const user = FastPayV2.getCurrentUser();
  if(!user) return;

  FastPayV2.markAllNotificationsRead(user.id);
  showPageNotice("Tout notifications yo make kòm li.", "success");

  setTimeout(() => {
    window.location.reload();
  }, 700);
}
</script>

</body>
</html>
