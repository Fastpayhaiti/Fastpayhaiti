<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPay Premium Notifications</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      background:#05070c;
      color:#ffffff;
      min-height:100vh;
    }

    .app{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      padding:18px 18px 110px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .left-top{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      width:48px;
      height:48px;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      color:#ffffff;
      font-size:22px;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .page-title{
      font-size:24px;
      font-weight:800;
    }

    .profile-avatar{
      width:48px;
      height:48px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:700;
    }

    .hero-card{
      background:linear-gradient(135deg,#0d1117,#1c2330);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:22px;
      margin-bottom:22px;
      box-shadow:0 22px 45px rgba(0,0,0,0.35);
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(47,60,255,0.10);
      top:-40px;
      right:-40px;
    }

    .hero-label{
      color:#9ca3af;
      font-size:14px;
      margin-bottom:8px;
      position:relative;
      z-index:2;
    }

    .hero-title{
      font-size:34px;
      font-weight:800;
      position:relative;
      z-index:2;
    }

    .hero-sub{
      margin-top:10px;
      color:#8b93a7;
      font-size:14px;
      position:relative;
      z-index:2;
    }

    .section-title{
      font-size:22px;
      font-weight:800;
      margin-bottom:14px;
    }

    .list-box{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:10px 16px;
    }

    .note-item{
      padding:16px 0;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .note-item:last-child{
      border-bottom:none;
    }

    .note-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .note-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:6px;
    }

    .note-date{
      font-size:12px;
      color:#8b93a7;
      white-space:nowrap;
    }

    .note-text{
      font-size:14px;
      color:#cfd5e3;
      line-height:1.5;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      margin-top:10px;
    }

    .badge-info{
      background:rgba(47,60,255,0.18);
      color:#cfd5ff;
    }

    .badge-success{
      background:rgba(17,156,103,0.18);
      color:#7ff0be;
    }

    .badge-warning{
      background:rgba(245,158,11,0.18);
      color:#fcd34d;
    }

    .empty{
      color:#8b93a7;
      font-size:14px;
      padding:10px 0;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      width:100%;
      max-width:430px;
      background:#04060a;
      border-top:1px solid rgba(255,255,255,0.08);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      padding:12px 8px 14px;
      z-index:1000;
    }

    .nav-item{
      text-decoration:none;
      color:#8b93a7;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:600;
    }

    .nav-item i{
      font-size:23px;
    }

    .nav-item.active{
      color:#3b4cff;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="left-top">
      <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="page-title">Notifications</div>
    </div>
    <div class="profile-avatar" id="profileLetter">A</div>
  </div>

  <div class="hero-card">
    <div class="hero-label">FastPay Alerts</div>
    <div class="hero-title" id="noteCount">0</div>
    <div class="hero-sub">Tout alèt, mizajou, ak enfòmasyon kont ou yo nan yon sèl paj.</div>
  </div>

  <div class="section-title">Recent Notifications</div>
  <div class="list-box" id="notificationsBox">
    <div class="empty">Pa gen notifikasyon pou kounye a.</div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>
  <a href="statement.html" class="nav-item">
    <i class="fa-solid fa-arrow-rotate-left"></i>
    <span>Transactions</span>
  </a>
  <a href="giftcard.html" class="nav-item">
    <i class="fa-brands fa-bitcoin"></i>
    <span>Services</span>
  </a>
  <a href="card-dashboard.html" class="nav-item">
    <i class="fa-regular fa-credit-card"></i>
    <span>Cards</span>
  </a>
  <a href="wallet.html" class="nav-item active">
    <i class="fa-solid fa-wallet"></i>
    <span>Wallet</span>
  </a>
</div>

<script src="app.js"></script>
<script>
  const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
  if(savedUser && savedUser.fullname){
    document.getElementById("profileLetter").innerText = savedUser.fullname.charAt(0).toUpperCase();
  }

  function getCurrentUser(){
    if(window.FastPayV2 && FastPayV2.getCurrentUser){
      return FastPayV2.getCurrentUser();
    }
    return savedUser;
  }

  function getBadgeClass(type){
    const t = String(type || "").toLowerCase();
    if(t.includes("success")) return "badge-success";
    if(t.includes("warning")) return "badge-warning";
    return "badge-info";
  }

  const user = getCurrentUser();
  if(user && window.FastPayV2 && FastPayV2.getUserNotifications){
    const notes = FastPayV2.getUserNotifications(user.id) || [];
    document.getElementById("noteCount").innerText = notes.length;

    const box = document.getElementById("notificationsBox");
    if(notes.length > 0){
      box.innerHTML = "";
      notes.forEach(function(note){
        box.innerHTML += `
          <div class="note-item">
            <div class="note-top">
              <div class="note-title">${note.title || "Nouvo alèt"}</div>
              <div class="note-date">${note.date || ""}</div>
            </div>
            <div class="note-text">${note.text || ""}</div>
            <div class="badge ${getBadgeClass(note.type)}">${note.type || "info"}</div>
          </div>
        `;
      });
    }
  }
</script>

</body>
</html>
