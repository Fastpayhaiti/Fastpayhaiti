<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPay Notifications</title>
<style>
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  background:#eef2f7;
  padding:20px;
  color:#111827;
}

.container{
  max-width:430px;
  margin:auto;
}

.back{
  display:inline-block;
  margin-bottom:16px;
  color:#ff4d3d;
  text-decoration:none;
  font-weight:bold;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.logo{
  font-size:30px;
  font-weight:bold;
  color:#ff5a3d;
}

.profile{
  width:46px;
  height:46px;
  border-radius:14px;
  background:linear-gradient(135deg,#ff5a3d,#ff7a59);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 6px 16px rgba(255,90,61,0.25);
}

.hero{
  background:linear-gradient(135deg,#111827,#374151);
  color:white;
  border-radius:26px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 12px 28px rgba(17,24,39,0.22);
}

.hero h1{
  margin:0 0 10px 0;
  font-size:30px;
  line-height:1.2;
}

.hero p{
  margin:0;
  font-size:15px;
  line-height:1.6;
  opacity:0.98;
}

.section{
  background:white;
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 18px rgba(0,0,0,0.06);
  margin-bottom:18px;
}

.section h2{
  margin:0 0 14px 0;
  font-size:22px;
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.stat-box{
  background:#f8fafc;
  border-radius:16px;
  padding:14px;
}

.stat-title{
  color:#6b7280;
  font-size:13px;
  margin-bottom:6px;
}

.stat-value{
  font-size:20px;
  font-weight:bold;
  color:#111827;
}

.notice-item{
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.notice-item:last-child{
  border-bottom:none;
}

.notice-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.notice-title{
  font-weight:bold;
  font-size:15px;
}

.notice-date{
  color:#6b7280;
  font-size:13px;
  margin-top:4px;
}

.notice-text{
  color:#4b5563;
  font-size:14px;
  margin-top:6px;
  line-height:1.5;
}

.badge{
  display:inline-block;
  margin-top:8px;
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;
  font-weight:bold;
}

.badge-green{
  background:#ecfdf3;
  color:#166534;
}

.badge-orange{
  background:#fff7ed;
  color:#c2410c;
}

.badge-blue{
  background:#eff6ff;
  color:#1d4ed8;
}

.empty{
  color:#6b7280;
  font-size:14px;
}

.main-btn{
  display:block;
  width:100%;
  text-align:center;
  padding:15px;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
  margin-top:12px;
}

.orange-btn{
  background:#ff4d3d;
  color:white;
}

.dark-btn{
  background:#111827;
  color:white;
}
</style>
</head>
<body>

<div class="container">

<a href="dashboard.html" class="back">← Back Dashboard</a>

<div class="topbar">
  <div class="logo">FastPay</div>
  <div class="profile" id="profileLetter">L</div>
</div>

<div class="hero">
  <h1>Notifications</h1>
  <p>Tout alèt ak nouvèl sou kont ou, wallet ou, ak sèvis ou yo nan yon sèl kote.</p>
</div>

<div class="section">
  <h2>Rezime</h2>

  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-title">Total Notifications</div>
      <div class="stat-value" id="totalNotifications">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Latest Type</div>
      <div class="stat-value" id="latestType">Pa gen</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Latest Date</div>
      <div class="stat-value" id="latestDate">N/A</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Wallet Balance</div>
      <div class="stat-value" id="walletBalance">0 HTG</div>
    </div>
  </div>
</div>

<div class="section">
  <h2>Dènye notifikasyon yo</h2>
  <div id="noticeBox" class="empty">Pa gen notifikasyon pou kounye a.</div>

  <a href="wallet.html" class="main-btn orange-btn">Ale sou Wallet</a>
  <a href="statement.html" class="main-btn dark-btn">Ale sou Statement</a>
</div>

</div>

<script>
const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
const walletBalance = localStorage.getItem("fastpay_balance") || 0;

const deposits = JSON.parse(localStorage.getItem("fastpay_deposits")) || [];
const withdraws = JSON.parse(localStorage.getItem("fastpay_withdraws")) || [];
const transfers = JSON.parse(localStorage.getItem("fastpay_transfers")) || [];
const topups = JSON.parse(localStorage.getItem("fastpay_topups")) || [];
const socialOrders = JSON.parse(localStorage.getItem("fastpay_social_orders")) || [];
const rechargeCards = JSON.parse(localStorage.getItem("fastpay_recharge_cards")) || [];
const cardRequests = JSON.parse(localStorage.getItem("fastpay_card_requests")) || [];
const transactions = JSON.parse(localStorage.getItem("fastpay_transactions")) || [];

if(savedUser && savedUser.fullname){
  document.getElementById("profileLetter").innerHTML =
    savedUser.fullname.charAt(0).toUpperCase();
}

document.getElementById("walletBalance").innerHTML = walletBalance + " HTG";

function buildNotifications(){
  let notices = [];

  deposits.forEach(item => {
    notices.push({
      title: "Deposit Request",
      text: "Nou resevwa yon demann depo pou " + (item.amount || "0") + ".",
      date: item.date || "",
      type: item.status || "Pending Verification",
      badge: "green"
    });
  });

  withdraws.forEach(item => {
    notices.push({
      title: "Withdraw Request",
      text: "Demann retrè ou a anrejistre pou " + (item.amount || "0") + ".",
      date: item.date || "",
      type: item.status || "Pending Verification",
      badge: "orange"
    });
  });

  transfers.forEach(item => {
    notices.push({
      title: "Transfer Request",
      text: "Ou voye yon demann transfè pou " + (item.receiverName || "Receiver") + ".",
      date: item.date || "",
      type: item.status || "Pending Verification",
      badge: "blue"
    });
  });

  topups.forEach(item => {
    notices.push({
      title: "Top Up Order",
      text: "Top Up ou a pou " + (item.phoneNumber || "nimewo") + " anrejistre.",
      date: item.date || "",
      type: item.status || "Pending Payment Verification",
      badge: "orange"
    });
  });

  socialOrders.forEach(item => {
    notices.push({
      title: "Social Media Order",
      text: "Lòd ou a pou " + (item.service || "service") + " anrejistre.",
      date: item.date || "",
      type: item.status || "Pending Review",
      badge: "blue"
    });
  });

  rechargeCards.forEach(item => {
    notices.push({
      title: "Recharge Card Request",
      text: "Recharge " + (item.service || "card") + " ou a anrejistre.",
      date: item.date || "",
      type: item.status || "Pending Verification",
      badge: "orange"
    });
  });

  cardRequests.forEach(item => {
    notices.push({
      title: "Virtual Card Request",
      text: "Demann kat ou a pou " + (item.cardType || "Virtual Card") + " anrejistre.",
      date: item.date || "",
      type: item.status || "Pending Payment Verification",
      badge: "blue"
    });
  });

  transactions.forEach(item => {
    notices.push({
      title: "Wallet Transaction",
      text: "Yon tranzaksyon fèt sou wallet ou: " + (item.service || "Transaction") + ".",
      date: item.date || "",
      type: "Completed",
      badge: "green"
    });
  });

  return notices.sort((a, b) => new Date(b.date) - new Date(a.date));
}

const notices = buildNotifications();

document.getElementById("totalNotifications").innerHTML = notices.length;

if(notices.length > 0){
  document.getElementById("latestType").innerHTML = notices[0].title || "Wi";
  document.getElementById("latestDate").innerHTML = notices[0].date || "N/A";
}

function getBadgeClass(type){
  if(type === "green") return "badge-green";
  if(type === "blue") return "badge-blue";
  return "badge-orange";
}

function loadNotifications(){
  const box = document.getElementById("noticeBox");

  if(notices.length === 0){
    box.innerHTML = "Pa gen notifikasyon pou kounye a.";
    return;
  }

  box.innerHTML = "";

  notices.forEach(item => {
    box.innerHTML += `
      <div class="notice-item">
        <div class="notice-top">
          <div>
            <div class="notice-title">${item.title}</div>
            <div class="notice-date">${item.date}</div>
          </div>
        </div>
        <div class="notice-text">${item.text}</div>
        <div class="badge ${getBadgeClass(item.badge)}">${item.type}</div>
      </div>
    `;
  });
}

loadNotifications();
</script>

</body>
  </html>
