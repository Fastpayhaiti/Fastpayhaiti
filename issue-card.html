<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue Card - FastPay</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#05070c;
color:#fff;
min-height:100vh;
}

.app{
max-width:430px;
margin:auto;
padding:20px;
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.back{
width:45px;
height:45px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
text-decoration:none;
color:white;
}

.title{
font-size:24px;
font-weight:800;
}

.form-box{
background:linear-gradient(135deg,#0d1117,#1c2330);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
padding:20px;
}

label{
font-size:14px;
font-weight:700;
margin-bottom:8px;
display:block;
color:#d1d5db;
}

input,select{

width:100%;
padding:14px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.06);
color:white;
margin-bottom:14px;

}

.btn{

width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#2f3cff;
color:white;
font-weight:800;
font-size:16px;
cursor:pointer;
box-shadow:0 14px 30px rgba(47,60,255,0.35);

}

.preview{

margin-top:20px;
padding:18px;
border-radius:20px;
background:linear-gradient(135deg,#1e293b,#0f172a);
border:1px solid rgba(255,255,255,0.1);

}

.card-number{

font-size:20px;
font-weight:800;
letter-spacing:2px;
margin:12px 0;

}

.meta{

display:flex;
justify-content:space-between;
font-size:14px;

}

.success{

margin-top:12px;
padding:12px;
border-radius:14px;
background:rgba(17,156,103,0.18);
border:1px solid rgba(17,156,103,0.35);
display:none;

}

</style>
</head>

<body>

<div class="app">

<div class="topbar">

<a href="admin-cards.html" class="back">
<i class="fa-solid fa-arrow-left"></i>
</a>

<div class="title">Issue Card</div>

<div></div>

</div>

<div class="form-box">

<label>User Email</label>
<input id="email" placeholder="client@email.com">

<label>Card Network</label>
<select id="network">
<option>Visa</option>
<option>Mastercard</option>
</select>

<label>Card Type</label>
<select id="type">
<option>Virtual</option>
<option>Physical</option>
</select>

<label>Currency</label>
<select id="currency">
<option>USD</option>
<option>HTG</option>
</select>

<label>Initial Balance</label>
<input id="balance" placeholder="0">

<label>Daily Limit</label>
<input id="limit" placeholder="25000">

<button class="btn" onclick="issueCard()">Create Card</button>

<div class="success" id="success">
Card created successfully
</div>

</div>

<div class="preview" id="preview">

<div>FastPay Card</div>

<div class="card-number" id="cardNumber">
**** **** **** 4587
</div>

<div class="meta">
<div>
Holder<br>
<span id="holder">FASTPAY USER</span>
</div>

<div>
Exp<br>
<span id="exp">12/29</span>
</div>
</div>

</div>

</div>

<script>

function generateCardNumber(){

let last = Math.floor(Math.random()*9000)+1000
return "4587 1234 9876 "+last

}

function issueCard(){

let email=document.getElementById("email").value
let network=document.getElementById("network").value
let type=document.getElementById("type").value
let currency=document.getElementById("currency").value
let balance=parseInt(document.getElementById("balance").value||0)
let limit=parseInt(document.getElementById("limit").value||0)

let users=JSON.parse(localStorage.getItem("fp_users")||"[]")

let user=users.find(u=>u.email===email)

if(!user){
alert("User not found")
return
}

let cards=JSON.parse(localStorage.getItem("fp_cards")||"[]")

let number=generateCardNumber()

let card={

id:"CARD_"+Date.now(),
userId:user.id,
name:user.fullname,
number:number,
brand:network,
cardType:type,
currency:currency,
balance:balance,
dailyLimit:limit,
exp:"12/29",
status:"Active"

}

cards.unshift(card)

localStorage.setItem("fp_cards",JSON.stringify(cards))

document.getElementById("cardNumber").innerText=number
document.getElementById("holder").innerText=user.fullname.toUpperCase()

document.getElementById("success").style.display="block"

}

</script>

</body>
</html>
