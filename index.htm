<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastPay-Haiti</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #eef2f7;
      padding: 20px;
    }

    .app {
      max-width: 420px;
      margin: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #ff5a3d;
    }

    .profile {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff5a3d, #ff7a59);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .balance-card {
      background: linear-gradient(135deg, #ff4d3d, #ff8a5c);
      color: white;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(255, 90, 61, 0.25);
      margin-bottom: 20px;
    }

    .balance-card h2 {
      margin: 0;
      font-size: 18px;
      font-weight: normal;
    }

    .balance {
      font-size: 42px;
      font-weight: bold;
      margin: 12px 0 22px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .action-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      color: white;
      padding: 16px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .action-btn:hover {
      opacity: 0.9;
    }

    .card-virtual {
      margin-bottom: 20px;
    }

    .card-virtual h3 {
      margin: 0 0 12px 0;
      font-size: 22px;
      color: #111827;
    }

    .virtual-card {
      background: linear-gradient(135deg, #111, #333);
      color: white;
      border-radius: 20px;
      padding: 20px;
      height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      position: relative;
    }

    .card-chip {
      width: 42px;
      height: 32px;
      background: gold;
      border-radius: 6px;
    }

    .card-number {
      font-size: 20px;
      letter-spacing: 2px;
    }

    .card-name {
      font-weight: bold;
      font-size: 16px;
    }

    .card-exp {
      font-size: 14px;
      opacity: 0.8;
    }

    .card-logo {
      position: absolute;
      right: 20px;
      bottom: 20px;
      font-weight: bold;
      font-size: 18px;
      opacity: 0.85;
      color: white;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: white;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .stat-box h3 {
      margin: 0;
      font-size: 15px;
      color: #666;
      font-weight: normal;
    }

    .stat-box p {
      margin: 10px 0 0;
      font-size: 28px;
      font-weight: bold;
      color: #222;
    }

    .transactions {
      background: white;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .transactions h3 {
      margin-top: 0;
      font-size: 24px;
      color: #222;
    }

    .tx {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }

    .tx:last-child {
      border-bottom: none;
    }

    .tx-name {
      font-weight: bold;
      color: #222;
    }

    .tx-date {
      font-size: 13px;
      color: #777;
      margin-top: 4px;
    }

    .tx-amount {
      font-weight: bold;
      color: #ff5a3d;
    }

    .empty {
      color: #6b7280;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="logo">FastPay</div>
      <div class="profile">L</div>
    </div>

    <div class="balance-card">
      <h2>Solde disponib</h2>
      <div class="balance" id="balance">0 HTG</div>

      <div class="actions">
        <button class="action-btn" onclick="transfere()">Transfere</button>
        <button class="action-btn" onclick="depose()">Depoze</button>
        <button class="action-btn" onclick="retire()">Retire</button>
        <button class="action-btn" onclick="demande()">Demande</button>
      </div>
    </div>

    <div class="card-virtual">
      <h3>Virtual Card</h3>
      <div class="virtual-card">
        <div class="card-chip"></div>
        <div class="card-number">**** **** **** 4587</div>
        <div class="card-name">LUCKYSTORE</div>
        <div class="card-exp">12/29</div>
        <div class="card-logo">VISA</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <h3>Total voye</h3>
        <p id="sentStat">0 HTG</p>
      </div>
      <div class="stat-box">
        <h3>Total retire</h3>
        <p id="withdrawStat">0 HTG</p>
      </div>
      <div class="stat-box">
        <h3>Aktivite mansyèl</h3>
        <p id="monthlyStat">0 HTG</p>
      </div>
      <div class="stat-box">
        <h3>Kat aktif</h3>
        <p>1</p>
      </div>
    </div>

    <div class="transactions">
      <h3>Dènye tranzaksyon</h3>
      <div id="txList">
        <div class="empty">Pa gen nouvo tranzaksyon pou kounye a.</div>
      </div>
    </div>
  </div>

  <script>
    let solde = 0;
    let totalVoye = 0;
    let totalRetire = 0;
    let aktivite = 0;

    function updateUI() {
      document.getElementById("balance").innerText = solde + " HTG";
      document.getElementById("sentStat").innerText = totalVoye + " HTG";
      document.getElementById("withdrawStat").innerText = totalRetire + " HTG";
      document.getElementById("monthlyStat").innerText = aktivite + " HTG";
    }

    function addTransaction(name, amountText) {
      const txList = document.getElementById("txList");
      const empty = txList.querySelector(".empty");
      if (empty) empty.remove();

      const tx = document.createElement("div");
      tx.className = "tx";

      const left = document.createElement("div");
      const txName = document.createElement("div");
      txName.className = "tx-name";
      txName.innerText = name;

      const txDate = document.createElement("div");
      txDate.className = "tx-date";
      txDate.innerText = "Jodi a • " + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      left.appendChild(txName);
      left.appendChild(txDate);

      const right = document.createElement("div");
      right.className = "tx-amount";
      right.innerText = amountText;

      tx.appendChild(left);
      tx.appendChild(right);

      txList.prepend(tx);
    }

    function depose() {
      let amount = prompt("Konbyen HTG ou vle depoze?");
      amount = parseInt(amount);

      if (isNaN(amount) || amount <= 0) {
        alert("Tanpri mete yon montan ki valab.");
        return;
      }

      solde += amount;
      aktivite += amount;
      updateUI();
      addTransaction("Depo MonCash", "+" + amount + " HTG");
      alert("Depo fèt avèk siksè.");
    }

    function retire() {
      let amount = prompt("Konbyen HTG ou vle retire?");
      amount = parseInt(amount);

      if (isNaN(amount) || amount <= 0) {
        alert("Tanpri mete yon montan ki valab.");
        return;
      }

      if (amount > solde) {
        alert("Balans ou pa sifi.");
        return;
      }

      solde -= amount;
      totalRetire += amount;
      aktivite += amount;
      updateUI();
      addTransaction("Retrè wallet", "-" + amount + " HTG");
      alert("Retrè fèt avèk siksè.");
    }

    function transfere() {
      let amount = prompt("Konbyen HTG ou vle transfere?");
      amount = parseInt(amount);

      if (isNaN(amount) || amount <= 0) {
        alert("Tanpri mete yon montan ki valab.");
        return;
      }

      if (amount > solde) {
        alert("Balans ou pa sifi pou transfè sa.");
        return;
      }

      solde -= amount;
      totalVoye += amount;
      aktivite += amount;
      updateUI();
      addTransaction("Transfè kliyan", "-" + amount + " HTG");
      alert("Transfè fèt avèk siksè.");
    }

    function demande() {
      alert("Fonksyon demande ap vini nan pwochen vèsyon an.");
    }

    updateUI();
  </script>
</body>
</html>
