<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastPay Premium Deposit History</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    body{
      background:#05070c;
      color:#ffffff;
      min-height:100vh;
    }

    .app{
      max-width:430px;
      margin:auto;
      min-height:100vh;
      padding:18px 18px 110px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(99,102,241,0.10), transparent 25%),
        #05070c;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .left-top{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      width:48px;
      height:48px;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      color:#ffffff;
      font-size:22px;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .page-title{
      font-size:24px;
      font-weight:800;
    }

    .profile-avatar{
      width:48px;
      height:48px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:700;
    }

    .hero-card{
      background:linear-gradient(135deg,#0d1117,#1c2330);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:22px;
      margin-bottom:22px;
      box-shadow:0 22px 45px rgba(0,0,0,0.35);
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(17,156,103,0.12);
      top:-40px;
      right:-40px;
    }

    .hero-label{
      color:#9ca3af;
      font-size:14px;
      margin-bottom:8px;
      position:relative;
      z-index:2;
    }

    .hero-title{
      font-size:34px;
      font-weight:800;
      position:relative;
      z-index:2;
    }

    .hero-sub{
      margin-top:10px;
      color:#8b93a7;
      font-size:14px;
      position:relative;
      z-index:2;
      line-height:1.5;
    }

    .stats-grid{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      position:relative;
      z-index:2;
    }

    .mini-box{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:18px;
      padding:14px;
    }

    .mini-label{
      color:#8b93a7;
      font-size:12px;
      margin-bottom:6px;
    }

    .mini-value{
      font-size:20px;
      font-weight:800;
    }

    .section-title{
      font-size:22px;
      font-weight:800;
      margin-bottom:14px;
    }

    .list-box{
      background:linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      padding:10px 16px;
    }

    .list-item{
      padding:16px 0;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .list-item:last-child{
      border-bottom:none;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .item-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:6px;
      line-height:1.35;
    }

    .item-sub{
      color:#8b93a7;
      font-size:13px;
      line-height:1.45;
      margin-bottom:4px;
      word-break:break-word;
    }

    .item-amount{
      font-size:15px;
      font-weight:800;
      white-space:nowrap;
      text-align:right;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      margin-top:8px;
    }

    .badge-success{
      background:rgba(17,156,103,0.18);
      color:#7ff0be;
    }

    .badge-warning{
      background:rgba(245,158,11,0.18);
      color:#fcd34d;
    }

    .badge-danger{
      background:rgba(217,60,75,0.18);
      color:#ffb4bf;
    }

    .empty{
      color:#8b93a7;
      font-size:14px;
      padding:10px 0;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      width:100%;
      max-width:430px;
      background:#04060a;
      border-top:1px solid rgba(255,255,255,0.08);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      padding:12px 8px 14px;
      z-index:1000;
    }

    .nav-item{
      text-decoration:none;
      color:#8b93a7;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      font-size:12px;
      font-weight:600;
    }

    .nav-item i{
      font-size:23px;
    }

    .nav-item.active{
      color:#3b4cff;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="left-top">
      <a href="deposit.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="page-title">Deposit History</div>
    </div>
    <div class="profile-avatar" id="profileLetter">A</div>
  </div>

  <div class="hero-card">
    <div class="hero-label">FastPay Deposits</div>
    <div class="hero-title" id="depositCount">0</div>
    <div class="hero-sub">Tout demann depo ou yo ak estati yo parèt la.</div>

    <div class="stats-grid">
      <div class="mini-box">
        <div class="mini-label">Pending</div>
        <div class="mini-value" id="pendingCount">0</div>
      </div>

      <div class="mini-box">
        <div class="mini-label">Completed</div>
        <div class="mini-value" id="completedCount">0</div>
      </div>

      <div class="mini-box">
        <div class="mini-label">Rejected</div>
        <div class="mini-value" id="rejectedCount">0</div>
      </div>

      <div class="mini-box">
        <div class="mini-label">Latest Amount</div>
        <div class="mini-value" id="latestAmount">0 HTG</div>
      </div>
    </div>
  </div>

  <div class="section-title">Recent Deposits</div>
  <div class="list-box" id="depositBox">
    <div class="empty">Pa gen deposit history pou kounye a.</div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <a href="statement.html" class="nav-item active">
    <i class="fa-solid fa-arrow-rotate-left"></i>
    <span>Transactions</span>
  </a>

  <a href="giftcard.html" class="nav-item">
    <i class="fa-brands fa-bitcoin"></i>
    <span>Services</span>
  </a>

  <a href="card-dashboard.html" class="nav-item">
    <i class="fa-regular fa-credit-card"></i>
    <span>Cards</span>
  </a>

  <a href="wallet.html" class="nav-item">
    <i class="fa-solid fa-wallet"></i>
    <span>Wallet</span>
  </a>
</div>

<script src="app.js"></script>
<script>
  const savedUser = JSON.parse(localStorage.getItem("fastpay_user"));
  if(savedUser && savedUser.fullname){
    document.getElementById("profileLetter").innerText = savedUser.fullname.charAt(0).toUpperCase();
  }

  function getCurrentUser(){
    if(window.FastPayV2 && FastPayV2.getCurrentUser){
      return FastPayV2.getCurrentUser();
    }
    return savedUser;
  }

  function getDeposits(){
    return JSON.parse(localStorage.getItem("fastpay_deposits") || "[]");
  }

  function getBadgeClass(status){
    const s = String(status || "").toLowerCase();
    if(s.includes("completed") || s.includes("approved") || s.includes("paid")) return "badge-success";
    if(s.includes("rejected") || s.includes("failed")) return "badge-danger";
    return "badge-warning";
  }

  const user = getCurrentUser();
  if(user){
    const deposits = getDeposits().filter(item => item.userId === user.id);

    document.getElementById("depositCount").innerText = deposits.length;
    document.getElementById("pendingCount").innerText =
      deposits.filter(item => String(item.status || "").toLowerCase().includes("pending")).length;
    document.getElementById("completedCount").innerText =
      deposits.filter(item => String(item.status || "").toLowerCase().includes("completed")).length;
    document.getElementById("rejectedCount").innerText =
      deposits.filter(item => String(item.status || "").toLowerCase().includes("rejected")).length;

    if(deposits.length > 0){
      document.getElementById("latestAmount").innerText = deposits[0].amount || "0 HTG";
    }

    const box = document.getElementById("depositBox");
    if(deposits.length > 0){
      box.innerHTML = "";
      deposits.forEach(function(item){
        box.innerHTML += `
          <div class="list-item">
            <div class="item-top">
              <div>
                <div class="item-title">${item.method || "Deposit Method"}</div>
                <div class="item-sub">${item.date || ""}</div>
                <div class="item-sub">${item.note || "Pa gen nòt"}</div>
                <div class="badge ${getBadgeClass(item.status)}">${item.status || "Pending"}</div>
              </div>
              <div class="item-amount">${item.amount || "0 HTG"}</div>
            </div>
          </div>
        `;
      });
    }
  }
</script>

</body>
  </html>
